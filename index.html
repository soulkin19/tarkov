<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Elite Infiltration: Tactical Defense</title>
    <style>
        body { background: #1a1a1a; color: #fff; text-align: center; font-family: 'Courier New', Courier, monospace; overflow: hidden; margin: 0; }
        canvas { background: #222; display: block; margin: 0; border: none; cursor: crosshair; }
        .ui { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px; text-align: left; pointer-events: none; }
        .timer-ui { position: fixed; top: 10px; right: 10px; font-size: 30px; color: #ff4444; }
    </style>
</head>
<body>
    <div class="ui">
        [HP] <span id="hp">200</span><br>
        [WEAPON] <span id="weaponName">Elite Auto-Rifle</span><br>
        [STATUS] <span id="status">INFILTRATE THE EAST BASE</span>
    </div>
    <div id="timerDisplay" class="timer-ui" style="display:none;">DEFENSE: 30s</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// マップ設定（画面より広く設定）
const WORLD_WIDTH = 3000;
const WORLD_HEIGHT = 800;
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameState = 'infiltrate'; 
let defenseTimer = 30;
let player = { x: 100, y: 400, size: 25, hp: 200, maxHp: 200, speed: 6, weapon: 0 };
let enemies = [];
let bullets = [];
let enemyBullets = [];
let camera = { x: 0, y: 0 };

const weapons = [
    { name: "Elite Auto-Rifle", fireRate: 150, bulletSpeed: 15, spread: 0.05, count: 1, damage: 40 },
    { name: "Heavy Spread", fireRate: 400, bulletSpeed: 12, spread: 0.4, count: 8, damage: 20 },
    { name: "Rapid Vulcan", fireRate: 50, bulletSpeed: 18, spread: 0.15, count: 1, damage: 15 }
];

let lastFired = 0;
const keys = {};
let mouse = { x: 0, y: 0 };

// 入力処理
window.onkeydown = (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === '1') player.weapon = 0;
    if (e.key === '2') player.weapon = 1;
    if (e.key === '3') player.weapon = 2;
    document.getElementById('weaponName').innerText = weapons[player.weapon].name;
};
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
window.onmousemove = (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
};

function spawnEnemy(isMachineGunner = false) {
    let x, y;
    if (gameState === 'infiltrate') {
        x = player.x + canvas.width/2 + Math.random() * 500;
        y = Math.random() * WORLD_HEIGHT;
    } else {
        // 本部防衛時は左右上下からランダム
        const side = Math.floor(Math.random() * 4);
        if(side === 0) { x = player.x - 600; y = Math.random()*WORLD_HEIGHT; }
        else { x = player.x + 600; y = Math.random()*WORLD_HEIGHT; }
    }
    
    enemies.push({
        x: x, y: y,
        hp: isMachineGunner ? 150 : 50,
        size: isMachineGunner ? 30 : 20,
        type: isMachineGunner ? 'heavy' : 'normal',
        lastFired: 0,
        speed: isMachineGunner ? 1 : 3,
        fireInterval: isMachineGunner ? 200 : 1500 // マシンガン兵は高速連射
    });
}

function shoot(fromX, fromY, targetX, targetY, isEnemy, weaponType = null) {
    const angle = Math.atan2(targetY - fromY, targetX - fromX);
    let config = isEnemy ? { count: 1, spread: 0, speed: 7, damage: 10 } : weapons[player.weapon];
    
    // マシンガン兵用設定
    if (weaponType === 'heavy') {
        config = { count: 1, spread: 0.2, speed: 10, damage: 5 };
    }

    for (let i = 0; i < config.count; i++) {
        const finalAngle = angle + (Math.random() - 0.5) * (config.spread || 0);
        const b = {
            x: fromX, y: fromY,
            vx: Math.cos(finalAngle) * (config.speed || config.bulletSpeed),
            vy: Math.sin(finalAngle) * (config.speed || config.bulletSpeed),
            damage: config.damage,
            isEnemy: isEnemy
        };
        if (isEnemy) enemyBullets.push(b); else bullets.push(b);
    }
}

function update(time) {
    if (gameState === 'gameover' || gameState === 'win') return;

    // 移動
    if (keys['w'] && player.y > 0) player.y -= player.speed;
    if (keys['s'] && player.y < WORLD_HEIGHT) player.y += player.speed;
    if (keys['a'] && player.x > 0) player.x -= player.speed;
    if (keys['d'] && player.x < WORLD_WIDTH) player.x += player.speed;

    // カメラ追従
    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;

    // 自動射撃 (マウスの方向)
    const targetX = mouse.x + camera.x;
    const targetY = mouse.y + camera.y;
    if (time - lastFired > weapons[player.weapon].fireRate) {
        shoot(player.x, player.y, targetX, targetY, false);
        lastFired = time;
    }

    // 本部エリア到達判定
    if (gameState === 'infiltrate' && player.x > WORLD_WIDTH - 400) {
        gameState = 'defense';
        document.getElementById('status').innerText = "HOLD THE POSITION!";
        document.getElementById('timerDisplay').style.display = 'block';
        let itv = setInterval(() => {
            defenseTimer--;
            document.getElementById('timerDisplay').innerText = `DEFENSE: ${defenseTimer}s`;
            if (defenseTimer <= 0) {
                clearInterval(itv);
                gameState = 'win';
            }
        }, 1000);
    }

    // 敵生成ロジック
    if (Math.random() < (gameState === 'defense' ? 0.08 : 0.02)) {
        spawnEnemy(gameState === 'defense' && Math.random() > 0.5);
    }

    // 更新系
    [bullets, enemyBullets].forEach(list => {
        for (let i = list.length - 1; i >= 0; i--) {
            list[i].x += list[i].vx; list[i].y += list[i].vy;
            if (Math.abs(list[i].x - player.x) > 1000) list.splice(i, 1);
        }
    });

    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        let dx = player.x - e.x; let dy = player.y - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        // AI移動
        if (dist > 250) {
            e.x += (dx/dist) * e.speed;
            e.y += (dy/dist) * e.speed;
        }

        // 敵射撃
        if (time - e.lastFired > e.fireInterval) {
            shoot(e.x, e.y, player.x, player.y, true, e.type);
            e.lastFired = time;
        }

        // 当たり判定 (プレイヤー弾 -> 敵)
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            if (Math.hypot(e.x - b.x, e.y - b.y) < e.size) {
                e.hp -= b.damage;
                bullets.splice(j, 1);
                if (e.hp <= 0) { enemies.splice(i, 1); break; }
            }
        }
    }

    // 当たり判定 (敵弾 -> プレイヤー)
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        let b = enemyBullets[i];
        if (Math.hypot(player.x - b.x, player.y - b.y) < player.size) {
            player.hp -= b.damage;
            enemyBullets.splice(i, 1);
            document.getElementById('hp').innerText = Math.max(0, player.hp);
            if (player.hp <= 0) gameState = 'gameover';
        }
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.save();
    ctx.translate(-camera.x, -camera.y);
    ctx.clearRect(camera.x, camera.y, canvas.width, canvas.height);

    // 地面のグリッド（広さを視覚化）
    ctx.strokeStyle = "#333";
    for(let x=0; x<WORLD_WIDTH; x+=100) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_HEIGHT); ctx.stroke();
    }
    for(let y=0; y<WORLD_HEIGHT; y+=100) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WORLD_WIDTH, y); ctx.stroke();
    }

    // 本部エリア
    ctx.fillStyle = "rgba(255, 0, 0, 0.2)";
    ctx.fillRect(WORLD_WIDTH - 400, 0, 400, WORLD_HEIGHT);

    // プレイヤー
    ctx.shadowBlur = 15; ctx.shadowColor = "cyan";
    ctx.fillStyle = "cyan";
    ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // 敵
    enemies.forEach(e => {
        ctx.fillStyle = e.type === 'heavy' ? "#ff00ff" : "#ff4444";
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
        // HPバー
        ctx.fillStyle = "#555"; ctx.fillRect(e.x-20, e.y-35, 40, 5);
        ctx.fillStyle = "#0f0"; ctx.fillRect(e.x-20, e.y-35, (e.hp/(e.type==='heavy'?150:50))*40, 5);
    });

    // 弾
    ctx.fillStyle = "#fff";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 8, 2));
    ctx.fillStyle = "#ff0";
    enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, 6, 6));

    ctx.restore();

    if (gameState === 'win') {
        ctx.fillStyle = "gold"; ctx.font = "bold 70px sans-serif";
        ctx.fillText("MISSION COMPLETE", canvas.width/2 - 350, canvas.height/2);
    }
    if (gameState === 'gameover') {
        ctx.fillStyle = "red"; ctx.font = "bold 70px sans-serif";
        ctx.fillText("MISSION FAILED", canvas.width/2 - 300, canvas.height/2);
    }
}

requestAnimationFrame(update);
</script>
</body>
</html>
