<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Online: Tactical Pro</title>
    <style>
        /* スタイルは変更なし */
        * { touch-action: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #f0e68c; font-family: 'Arial Black', sans-serif; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; background-color: #eddfb3; }
        #setup { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; padding: 20px; text-align: center; }
        .btn { padding: 12px 20px; margin: 8px; font-size: 14px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .selected { border: 4px solid #f1c40f !important; box-shadow: 0 0 15px #f1c40f; }
        .opt-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .sys-btn { background: #2c3e50; color: white; width: 160px; text-align: left; }
        .sys-btn small { font-weight: normal; font-size: 10px; display: block; opacity: 0.8; }
        .label { font-size: 12px; color: #f1c40f; margin-bottom: 5px; text-transform: uppercase; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.85); padding: 10px; border-radius: 8px; border: 2px solid #555; min-width: 170px; pointer-events: none; z-index: 10; }
        .bar-bg { width: 100%; height: 6px; background: #ccc; margin-top: 4px; border-radius: 3px; overflow: hidden; }
        #gadget-bar { width: 0%; height: 100%; background: #8e44ad; }
        #defense-bar { width: 0%; height: 100%; background: #2980b9; }
        #team-indicator { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #f1c40f; padding: 5px 15px; border-radius: 20px; font-size: 14px; z-index: 50; }
        #killLog { position: absolute; top: 10px; right: 10px; color: #c0392b; font-size: 14px; text-align: right; font-weight: bold; pointer-events: none; }
        #mobile-controls { display: none; position: absolute; inset: 0; pointer-events: none; z-index: 20; }
        #stick-area { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.2); }
        #stick { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%); }
        .action-btn { position: absolute; width: 70px; height: 70px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; pointer-events: auto; border: 2px solid #fff; }
        #btn-fire { bottom: 130px; right: 40px; width: 90px; height: 90px; background: rgba(192, 57, 43, 0.7); }
        #btn-gadget { bottom: 50px; right: 140px; background: rgba(142, 68, 173, 0.7); }
        #btn-def { bottom: 50px; right: 40px; background: rgba(41, 128, 185, 0.7); }
        .ammo-selector { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .ammo-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.6); color: #fff; border: 2px solid #f1c40f; border-radius: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:#f1c40f;">TANK ONLINE: SMOOTH</h1>
        <div class="label">戦車タイプ選択</div>
        <div class="opt-group">
            <button id="type-heavy" class="btn sys-btn">重戦車</button>
            <button id="type-medium" class="btn sys-btn selected">中戦車</button>
            <button id="type-light" class="btn sys-btn">軽戦車</button>
        </div>
        <div class="label">セカンダリ武装</div>
        <div class="opt-group">
            <button id="def-1" class="btn sys-btn selected">AT4</button>
            <button id="def-6" class="btn sys-btn">ADS</button>
            <button id="def-7" class="btn sys-btn">リモートC4</button>
            <button id="def-4" class="btn sys-btn">近接信管</button>
        </div>
        <button id="start-game" class="btn" style="background:#f1c40f; color:#000; width:300px; font-size:20px;">BATTLE START</button>
    </div>

    <div id="team-indicator">TEAM: <span id="team-name">Free</span></div>
    <div id="ui">
        <div id="hpDisplay">HP: 100</div>
        <div id="weaponDisplay">HE</div>
        <div class="bar-bg"><div id="gadget-bar"></div></div>
        <div class="bar-bg"><div id="defense-bar"></div></div>
    </div>
    <div id="killLog"></div>
    <div id="mobile-controls">
        <div id="stick-area"><div id="stick"></div></div>
        <div id="btn-fire" class="action-btn">FIRE</div>
        <div id="btn-gadget" class="action-btn">R</div>
        <div id="btn-def" class="action-btn">Q</div>
        <div class="ammo-selector" id="ammo-list"></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const worldWidth = 2000, worldHeight = 1500;
        const HUB_NAME = "tank_v2_smooth_45fps_2026"; 

        const teamName = window.location.hash.substring(1) || "Free";
        document.getElementById('team-name').innerText = teamName;

        const tankSpecs = {
            'heavy':  { hp: 150, maxHp: 150, speed: 0.35, powerMult: 1.8, reloadMult: 1.5, color: '#1a2a1a' },
            'medium': { hp: 100, maxHp: 100, speed: 0.5,  powerMult: 1.0, reloadMult: 1.0, color: '#2d5a27' },
            'light':  { hp: 60,  maxHp: 60,  speed: 1.0,  powerMult: 0.5, reloadMult: 0.7, color: '#4a7c44' }
        };

        const ammoTypes = {
            '1': { name: "HE", power: 12, reload: 20, speed: 11, color: "#e67e22", isExplosive: true },
            '2': { name: "AP", power: 22, reload: 25, bounce: true, speed: 13, color: "#34495e" },
            '3': { name: "APFSDS", power: 35, reload: 55, speed: 45, color: "#2c3e50" },
            '4': { name: "AE", power: 8, reload: 18, bounce: true, speed: 8, color: "#f1c40f" },
            '5': { name: "HESH", power: 20, reload: 35, speed: 10, color: "#9b59b6", isExplosive: true },
            '6': { name: "FS", power: 4, reload: 35, speed: 15, color: "#7f8c8d", isFlechette: true },
            '7': { name: "APHE", power: 25, reload: 35, speed: 18, color: "#e74c3c", isExplosive: true },
            '8': { name: "HEAT", power: 20, reload: 25, speed: 10, color: "#d35400", isExplosive: true }
        };

        const player = {
            id: "P-" + Math.random().toString(36).substr(2, 5),
            type: 'medium', team: teamName, x: 0, y: 0, angle: 0, turretAngle: 0, vx: 0, vy: 0, hp: 100, maxHp: 100,
            reloading: 0, currentAmmo: '1', name: "Guest", gadgetCD: 0, repairPool: 0,
            defense: 1, defenseCD: 0, adsActive: 0, c4: null, shake: 0
        };

        const players = {}, shells = [], explosions = [], keys = {};
        let isMobileMode = false;
        let lastSyncTime = 0;

        const walls = [
            {x: 0, y: 0, w: worldWidth, h: 20}, {x: 0, y: worldHeight-20, w: worldWidth, h: 20},
            {x: 0, y: 0, w: 20, h: worldHeight}, {x: worldWidth-20, y: 0, w: 20, h: worldHeight},
            // センター拠点
            {x: worldWidth/2-150, y: worldHeight/2-150, w: 300, h: 40},
            {x: worldWidth/2-150, y: worldHeight/2+110, w: 300, h: 40},
            {x: worldWidth/2-150, y: worldHeight/2-150, w: 40, h: 300},
            {x: worldWidth/2+110, y: worldHeight/2-150, w: 40, h: 300},
            // 戦術的障害物
            {x: 500, y: 400, w: 200, h: 200}, {x: worldWidth-700, y: 400, w: 200, h: 200},
            {x: 500, y: worldHeight-600, w: 200, h: 200}, {x: worldWidth-700, y: worldHeight-600, w: 200, h: 200}
        ];

        const ammoList = document.getElementById('ammo-list');
        Object.keys(ammoTypes).forEach(key => {
            const btn = document.createElement('div');
            btn.className = 'ammo-btn'; btn.innerText = key;
            btn.onclick = () => player.currentAmmo = key;
            ammoList.appendChild(btn);
        });

        function isPointInWall(x, y, padding = 25) {
            return walls.some(w => x + padding > w.x && x - padding < w.x + w.w && y + padding > w.y && y - padding < w.y + w.h);
        }

        function respawn() {
            let safe = false;
            while (!safe) {
                player.x = Math.random() * (worldWidth - 200) + 100;
                player.y = Math.random() * (worldHeight - 200) + 100;
                if (!isPointInWall(player.x, player.y, 45)) safe = true;
            }
            player.hp = tankSpecs[player.type].hp;
            player.vx = 0; player.vy = 0;
        }

        document.getElementById('start-game').onclick = () => {
            player.name = prompt("名前を入力", "T34") || "Guest";
            document.getElementById('setup').style.display = 'none';
            if('ontouchstart' in window) { isMobileMode = true; document.getElementById('mobile-controls').style.display = 'block'; }
            respawn(); initSocket(); requestAnimationFrame(gameLoop);
        };

        let socket;
        function initSocket() {
            socket = new WebSocket('wss://cloud.achex.ca/tank_smooth_tactical_v2');
            socket.onopen = () => {
                socket.send(JSON.stringify({auth: player.id, password: "pass"}));
                socket.send(JSON.stringify({joinHub: HUB_NAME}));
            };
            socket.onmessage = (e) => {
                const raw = JSON.parse(e.data); if (!raw.msg) return;
                const data = JSON.parse(raw.msg);
                if (data.type === 'move') {
                    if (!players[data.id]) {
                        players[data.id] = {...data, lastUpdate: Date.now()};
                    } else {
                        // 座標を直接書き換えず、ターゲットとして保存（補間用）
                        players[data.id].targetX = data.x;
                        players[data.id].targetY = data.y;
                        players[data.id].targetAngle = data.angle;
                        players[data.id].targetTAngle = data.tAngle;
                        players[data.id].hp = data.hp;
                        players[data.id].lastUpdate = Date.now();
                    }
                }
                if (data.type === 'fire') shells.push(data.shell);
                if (data.type === 'boom') createExplosion(data.x, data.y, data.power, data.ownerName, data.ownerTeam, data.weaponName, false);
                if (data.type === 'kill') showKillLog(data.victim, data.attacker, data.weaponName);
            };
        }

        function createExplosion(x, y, power, ownerName, ownerTeam, weaponName, isOwner) {
            const isCritical = power >= 25;
            explosions.push({ x, y, r: 0, life: isCritical ? 45 : 25, critical: isCritical });
            
            // フレンドリーファイア判定: Free同士は喰らう。同じチーム名(Free以外)なら無効
            const isFriendly = (ownerTeam !== "Free" && ownerTeam === player.team && ownerName !== player.name);
            if (Math.hypot(player.x - x, player.y - y) < (isCritical ? 130 : 90) && !isFriendly) {
                processDamage(power * 0.8, ownerName, weaponName);
            }
            if (isOwner) socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'boom', x, y, power, ownerName, ownerTeam, weaponName})}));
        }

        function processDamage(power, ownerName, weaponName) {
            if(player.hp <= 0) return;
            player.hp -= power; player.shake = Math.min(30, power);
            if (player.hp <= 0) {
                socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'kill', victim:player.name, attacker:ownerName, weaponName:weaponName})}));
                respawn(); 
            }
        }

        function update() {
            const spec = tankSpecs[player.type];
            // 自機の移動（略）
            if (keys['ArrowUp']) { player.vx += Math.cos(player.angle)*spec.speed; player.vy += Math.sin(player.angle)*spec.speed; }
            if (keys['ArrowDown']) { player.vx -= Math.cos(player.angle)*spec.speed*0.5; player.vy -= Math.sin(player.angle)*spec.speed*0.5; }
            if (keys['ArrowLeft']) { player.angle -= 0.045; player.turretAngle -= 0.045; }
            if (keys['ArrowRight']) { player.angle += 0.045; player.turretAngle += 0.045; }
            player.vx *= 0.91; player.vy *= 0.91;
            if (!isPointInWall(player.x + player.vx, player.y + player.vy, 22)) { player.x += player.vx; player.y += player.vy; }

            // 敵機の座標補間（滑らかにする処理）
            for (let id in players) {
                const p = players[id];
                if (p.targetX !== undefined) {
                    p.x += (p.targetX - p.x) * 0.25; // 線形補間
                    p.y += (p.targetY - p.y) * 0.25;
                    p.angle += (p.targetAngle - p.angle) * 0.25;
                    p.tAngle += (p.targetTAngle - p.tAngle) * 0.25;
                }
            }

            // 45fps(22ms)間隔で同期データを送信
            const now = Date.now();
            if (now - lastSyncTime > 22 && socket?.readyState === 1) {
                socket.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({
                    type: 'move', id: player.id, x: player.x, y: player.y, angle: player.angle, tAngle: player.turretAngle, 
                    hp: player.hp, name: player.name, team: player.team, tankType: player.type
                })}));
                lastSyncTime = now;
            }

            // 砲弾・爆発の更新（略）
            shells.forEach((s, i) => {
                s.x += s.vx; s.y += s.vy; s.life--;
                if (s.life <= 0 || isPointInWall(s.x, s.y, 5)) {
                    if (s.isExplosive) createExplosion(s.x, s.y, s.power, s.ownerName, s.ownerTeam, s.weaponName, s.owner === player.id);
                    shells.splice(i,1);
                } else if (s.owner !== player.id && Math.hypot(player.x-s.x, player.y-s.y) < 32) {
                    const isFriendly = (s.ownerTeam !== "Free" && s.ownerTeam === player.team);
                    if (!isFriendly) {
                        if (s.isExplosive) createExplosion(s.x, s.y, s.power, s.ownerName, s.ownerTeam, s.weaponName, true);
                        else processDamage(s.power, s.ownerName, s.weaponName);
                        shells.splice(i,1);
                    }
                }
            });
            explosions.forEach((e, i) => { e.r += 4; if(e.life-- <= 0) explosions.splice(i,1); });

            if (keys[' '] && player.reloading <= 0 && player.hp > 0) {
                const a = ammoTypes[player.currentAmmo];
                const s = { x: player.x + Math.cos(player.turretAngle)*45, y: player.y + Math.sin(player.turretAngle)*45, vx: Math.cos(player.turretAngle)*a.speed, vy: Math.sin(player.turretAngle)*a.speed, power: a.power * spec.powerMult, color: a.color, isExplosive: a.isExplosive, owner: player.id, ownerName: player.name, ownerTeam: player.team, weaponName: a.name, life: 200 };
                shells.push(s); socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'fire', shell:s})}));
                player.reloading = a.reload * spec.reloadMult;
            }
            if (player.reloading > 0) player.reloading--;
        }

        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.save();
            ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);
            ctx.fillStyle = "#e3d5a1"; ctx.fillRect(0,0,worldWidth,worldHeight);
            walls.forEach(w => { ctx.fillStyle = "#5d4037"; ctx.fillRect(w.x, w.y, w.w, w.h); });
            shells.forEach(s => { ctx.fillStyle = s.color; ctx.beginPath(); ctx.arc(s.x, s.y, 6, 0, Math.PI * 2); ctx.fill(); });

            const drawT = (t, isSelf) => {
                const spec = tankSpecs[t.tankType || 'medium'];
                const isAlly = (t.team !== "Free" && t.team === player.team);
                ctx.save(); ctx.translate(t.x, t.y);
                ctx.save(); ctx.rotate(t.angle); ctx.fillStyle = spec.color; ctx.fillRect(-22,-18,44,36); ctx.strokeRect(-22,-18,44,36); ctx.restore();
                ctx.save(); ctx.rotate(t.tAngle || t.turretAngle); ctx.fillStyle = spec.color; ctx.fillRect(-14,-14,28,28); ctx.strokeRect(-14,-14,28,28);
                ctx.fillStyle="#333"; ctx.fillRect(0,-5,40,10); ctx.restore();
                
                // 名前表示修正: (チーム) | 名前
                ctx.fillStyle = isSelf ? "black" : (isAlly ? "#2980b9" : "#c0392b");
                ctx.font = `bold 14px Arial`; ctx.textAlign="center"; 
                ctx.fillText(`(${t.team}) | ${t.name}`, 0, -45);
                
                ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(-25,-35,50,5);
                ctx.fillStyle = (t.hp/spec.maxHp) > 0.3 ? "#2ecc71" : "#e74c3c"; ctx.fillRect(-25,-35,50*(t.hp/spec.maxHp),5);
                ctx.restore();
            };

            for (let id in players) if(Date.now()-players[id].lastUpdate < 3000) drawT(players[id], false);
            if(player.hp > 0) drawT(player, true);
            explosions.forEach(b => { ctx.fillStyle = `rgba(255, 100, 0, ${b.life/30})`; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); });
            ctx.restore();
        }

        function showKillLog(v, a, w) { 
            const l = document.getElementById('killLog'); 
            l.innerHTML = `${v} <small>destroyed by</small> ${a} <br><small>[${w}]</small>`; 
            setTimeout(()=>l.innerText="", 5000); 
        }

        window.onkeydown = (e) => keys[e.key] = true;
        window.onkeyup = (e) => keys[e.key] = false;
        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    })();
    </script>
</body>
</html>
