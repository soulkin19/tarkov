<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Tactical Infiltration</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: fixed; top: 20px; left: 20px; color: #0ff; z-index: 100; pointer-events: none; }
        #timer { position: fixed; top: 20px; right: 20px; color: #f00; font-size: 40px; font-weight: bold; z-index: 100; }
        #msg { position: fixed; bottom: 20px; width: 100%; text-align: center; color: #555; z-index: 100; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="font-size: 24px;">HP: <span id="hp">1000</span></div>
        <div id="weaponName" style="font-size: 18px;">Spec-Ops 3D-AR</div>
    </div>
    <div id="timer" style="display:none;">30</div>
    <div id="msg">WASD: Move | Mouse: Aim | Auto-Fire Enabled</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

<script>
// --- 基本設定 ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- ゲームパラメータ ---
let player = { x: 0, z: 0, hp: 1000, speed: 0.5, weapon: 0 };
let gameState = 'infiltrate';
let defenseTimer = 30;
let lastFired = 0;
const enemies = [];
const bullets = [];
const keys = {};

const weapons = [
    { name: "3D-AR", fireRate: 150, speed: 2.5, damage: 50, color: 0x00ffff },
    { name: "3D-Spread", fireRate: 400, speed: 1.8, damage: 30, color: 0xff00ff },
    { name: "3D-Vulcan", fireRate: 60, speed: 3.0, damage: 15, color: 0xffff00 }
];

// --- ライトと床 ---
const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xffffff, 1);
sunLight.position.set(10, 50, 10);
scene.add(sunLight);

const grid = new THREE.GridHelper(10000, 100, 0x444444, 0x222222);
scene.add(grid);

// 本部エリアの視覚化（赤い透過BOX）
const baseGeo = new THREE.BoxGeometry(200, 10, 1000);
const baseMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.2 });
const baseMesh = new THREE.Mesh(baseGeo, baseMat);
baseMesh.position.set(2000, 5, 0);
scene.add(baseMesh);

// プレイヤー（簡易）
const playerGeo = new THREE.SphereGeometry(2, 16, 16);
const playerMat = new THREE.MeshPhongMaterial({ color: 0x00ffff });
const playerMesh = new THREE.Mesh(playerGeo, playerMat);
scene.add(playerMesh);

// --- 入力処理 ---
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === '1') player.weapon = 0;
    if (e.key === '2') player.weapon = 1;
    if (e.key === '3') player.weapon = 2;
    document.getElementById('weaponName').innerText = weapons[player.weapon].name;
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener('mousemove', e => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// --- 関数 ---
function spawnEnemy(isHeavy = false) {
    const geo = new THREE.BoxGeometry(3, isHeavy ? 6 : 3, 3);
    const mat = new THREE.MeshPhongMaterial({ color: isHeavy ? 0xff00ff : 0xff4444 });
    const mesh = new THREE.Mesh(geo, mat);
    
    const spawnX = player.x + 150 + Math.random() * 50;
    const spawnZ = player.z + (Math.random() - 0.5) * 200;
    mesh.position.set(spawnX, isHeavy ? 3 : 1.5, spawnZ);
    
    scene.add(mesh);
    enemies.push({
        mesh: mesh,
        hp: isHeavy ? 300 : 80,
        type: isHeavy ? 'heavy' : 'normal',
        lastFired: 0,
        fireRate: isHeavy ? 400 : 1500
    });
}

function createBullet(pos, dir, isEnemy, color) {
    const geo = new THREE.SphereGeometry(0.5, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    bullets.push({ mesh: mesh, dir: dir.clone(), isEnemy: isEnemy, damage: 15 });
}

// --- メインループ ---
function animate(time) {
    requestAnimationFrame(animate);

    // 移動
    if (keys['w']) player.x += player.speed * 2;
    if (keys['s']) player.x -= player.speed * 2;
    if (keys['a']) player.z -= player.speed * 2;
    if (keys['d']) player.z += player.speed * 2;
    playerMesh.position.set(player.x, 2, player.z);

    // カメラ
    camera.position.set(player.x - 30, 40, player.z);
    camera.lookAt(player.x + 20, 0, player.z);

    // 自動射撃（マウス方向へ）
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(grid);
    if (intersects.length > 0 && time - lastFired > weapons[player.weapon].fireRate) {
        const target = intersects[0].point;
        const dir = new THREE.Vector3().subVectors(target, playerMesh.position).normalize();
        createBullet(playerMesh.position, dir, false, weapons[player.weapon].color);
        lastFired = time;
    }

    // 本部イベント
    if (gameState === 'infiltrate' && player.x > 1900) {
        gameState = 'defense';
        const tDisp = document.getElementById('timer');
        tDisp.style.display = 'block';
        let itv = setInterval(() => {
            defenseTimer--;
            tDisp.innerText = defenseTimer;
            if (defenseTimer <= 0) {
                clearInterval(itv);
                alert("MISSION COMPLETE!");
                location.reload();
            }
        }, 1000);
    }

    // 敵スポーン（適正量に調整）
    if (Math.random() < (gameState === 'defense' ? 0.05 : 0.015)) {
        spawnEnemy(gameState === 'defense' && Math.random() > 0.6);
    }

    // 弾の更新と当たり判定
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.mesh.position.add(b.dir.clone().multiplyScalar(2));

        if (b.isEnemy) {
            if (b.mesh.position.distanceTo(playerMesh.position) < 3) {
                player.hp -= 10;
                document.getElementById('hp').innerText = Math.max(0, player.hp);
                scene.remove(b.mesh);
                bullets.splice(i, 1);
                if (player.hp <= 0) { alert("GAME OVER"); location.reload(); }
                continue;
            }
        } else {
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                if (b.mesh.position.distanceTo(e.mesh.position) < 4) {
                    e.hp -= 40;
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                    if (e.hp <= 0) {
                        scene.remove(e.mesh);
                        enemies.splice(j, 1);
                    }
                    break;
                }
            }
        }
        if (b.mesh.position.distanceTo(playerMesh.position) > 500) {
            scene.remove(b.mesh);
            bullets.splice(i, 1);
        }
    }

    // 敵AIと射撃修正
    enemies.forEach(e => {
        const dist = e.mesh.position.distanceTo(playerMesh.position);
        if (dist > 40) {
            const dir = new THREE.Vector3().subVectors(playerMesh.position, e.mesh.position).normalize();
            e.mesh.position.add(dir.multiplyScalar(0.2));
        }
        // 敵の射撃ロジック
        if (time - e.lastFired > e.fireRate) {
            const dir = new THREE.Vector3().subVectors(playerMesh.position, e.mesh.position).normalize();
            createBullet(e.mesh.position, dir, true, e.type === 'heavy' ? 0xff00ff : 0xff4444);
            e.lastFired = time;
        }
    });

    renderer.render(scene, camera);
}

animate(0);

// ウィンドウリサイズ対応
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
