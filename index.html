<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D風 ボットタクティカルシューター</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #00aaff;
            box-shadow: 0 0 30px #00aaff;
            image-rendering: pixelated;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 60px;
            text-align: center;
            display: none;
            text-shadow: 0 0 20px #ff0000;
        }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="600"></canvas>
    <div id="ui">
        <div>スコア: <span id="score">0</span></div>
        <div>ウェーブ: <span id="wave">1</span></div>
        <div>HP: <span id="health">100</span></div>
    </div>
    <div id="game-over">
        ゲームオーバー！<br>
        最終スコア: <span id="final-score">0</span><br>
        <small style="font-size:24px;">リロードで再挑戦</small>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const waveEl = document.getElementById('wave');
        const healthEl = document.getElementById('health');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');

        // ゲーム変数
        let player = {
            x: 400,
            y: 300,
            size: 20,
            speed: 5.5,
            health: 100,
            score: 0
        };

        let bullets = [];
        let enemies = [];
        let keys = {};
        let mouseX = 400;
        let mouseY = 300;
        let wave = 1;
        let gameRunning = true;

        // 背景の星（3D風）
        let stars = [];
        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random() * 800,
                y: Math.random() * 600,
                size: Math.random() * 3 + 1
            });
        }

        // 敵生成
        function spawnEnemy() {
            const side = Math.random() * 4 | 0;
            let x, y;
            if (side === 0) { x = Math.random() * 800; y = -40; }      // 上
            else if (side === 1) { x = Math.random() * 800; y = 640; } // 下
            else if (side === 2) { x = -40; y = Math.random() * 600; } // 左
            else { x = 840; y = Math.random() * 600; }                 // 右

            enemies.push({
                x: x,
                y: y,
                size: 18,
                speed: 3.4 + wave * 0.3
            });
        }

        // 弾生成
        function shoot() {
            if (!gameRunning) return;
            const dx = mouseX - player.x;
            const dy = mouseY - player.y;
            const dist = Math.hypot(dx, dy) || 1;
            
            bullets.push({
                x: player.x,
                y: player.y,
                vx: (dx / dist) * 22,
                vy: (dy / dist) * 22,
                size: 6
            });
        }

        // 衝突判定
        function checkCollision(a, b) {
            return Math.hypot(a.x - b.x, a.y - b.y) < a.size + b.size;
        }

        // ゲームループ
        function gameLoop() {
            if (!gameRunning) return;

            // 背景描画
            ctx.fillStyle = '#0a0a22';
            ctx.fillRect(0, 0, 800, 600);

            // 星（3D風）
            ctx.fillStyle = '#ffffff';
            for (let star of stars) {
                ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 300) * 0.4;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }
            ctx.globalAlpha = 1;

            // プレイヤー移動
            if (keys['w'] || keys['ArrowUp']) player.y -= player.speed;
            if (keys['s'] || keys['ArrowDown']) player.y += player.speed;
            if (keys['a'] || keys['ArrowLeft']) player.x -= player.speed;
            if (keys['d'] || keys['ArrowRight']) player.x += player.speed;

            // 画面端制限
            player.x = Math.max(player.size, Math.min(800 - player.size, player.x));
            player.y = Math.max(player.size, Math.min(600 - player.size, player.y));

            // プレイヤー描画（3D風光沢）
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00aaff';
            ctx.fillStyle = '#00aaff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();
            // 照準ライン
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
            ctx.restore();

            // 敵更新＆描画
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                
                // プレイヤーに向かって移動
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.hypot(dx, dy) || 1;
                e.x += (dx / dist) * e.speed;
                e.y += (dy / dist) * e.speed;

                // 描画（赤いボット）
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff4444';
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                ctx.fill();
                
                // ボット目
                ctx.fillStyle = '#111111';
                ctx.beginPath();
                ctx.arc(e.x - 6, e.y - 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x + 6, e.y - 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // プレイヤー衝突
                if (checkCollision(player, e)) {
                    player.health -= 18;
                    enemies.splice(i, 1);
                    if (player.health <= 0) {
                        endGame();
                        return;
                    }
                }
            }

            // 弾更新＆描画
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                // 描画
                ctx.fillStyle = '#22ff88';
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#22ff88';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();

                // 画面外削除
                if (b.x < 0 || b.x > 800 || b.y < 0 || b.y > 600) {
                    bullets.splice(i, 1);
                    continue;
                }

                // 敵と衝突
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (checkCollision(b, enemies[j])) {
                        player.score += 25;
                        enemies.splice(j, 1);
                        bullets.splice(i, 1);
                        break;
                    }
                }
            }

            // 全滅で次のウェーブ
            if (enemies.length === 0) {
                wave++;
                const spawnCount = 6 + wave * 4;
                for (let i = 0; i < spawnCount; i++) {
                    spawnEnemy();
                }
            }

            // UI更新
            scoreEl.textContent = player.score;
            waveEl.textContent = wave;
            healthEl.textContent = Math.max(0, Math.floor(player.health));

            // 次のフレーム
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = player.score;
            gameOverEl.style.display = 'block';
        }

        // 入力設定
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('click', () => shoot());

        // 初期敵生成
        function startGame() {
            for (let i = 0; i < 6; i++) {
                spawnEnemy();
            }
            gameLoop();
        }

        // スタート
        startGame();
    </script>
</body>
</html>
