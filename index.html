<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Base Infiltration - Last 30 Seconds</title>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; overflow: hidden; margin: 0; }
        canvas { background: #333; display: block; margin: 20px auto; border: 4px solid #555; cursor: crosshair; }
        .ui { font-size: 20px; margin-top: 10px; }
        .controls { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <div class="ui">
        HP: <span id="hp">100</span> | Weapon: <span id="weaponName">Handgun</span> | 
        Status: <span id="status">Infiltrate the Base!</span>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">WASD: Move | Click: Shoot | 1-3: Switch Weapons</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- ゲーム設定 ---
let player = { x: 50, y: 300, size: 20, hp: 100, speed: 4, weapon: 0 };
let enemies = [];
let bullets = [];
let enemyBullets = [];
let particles = [];
let gameState = 'infiltrate'; // infiltrate, defense, win, gameover
let defenseTimer = 30;
let lastTime = 0;
let spawnTimer = 0;

const weapons = [
    { name: "Handgun", fireRate: 400, bulletSpeed: 10, spread: 0, count: 1, damage: 25 },
    { name: "Shotgun", fireRate: 800, bulletSpeed: 8, spread: 0.3, count: 5, damage: 15 },
    { name: "Machine Gun", fireRate: 100, bulletSpeed: 12, spread: 0.1, count: 1, damage: 10 }
];

let lastFired = 0;
const keys = {};
let mouse = { x: 0, y: 0 };

// --- 入力検知 ---
window.onkeydown = (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === '1') player.weapon = 0;
    if (e.key === '2') player.weapon = 1;
    if (e.key === '3') player.weapon = 2;
    document.getElementById('weaponName').innerText = weapons[player.weapon].name;
};
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
};
let isMouseDown = false;
canvas.onmousedown = () => isMouseDown = true;
canvas.onmouseup = () => isMouseDown = false;

// --- ユーティリティ ---
function spawnEnemy(isElite = false) {
    let x = gameState === 'infiltrate' ? canvas.width + 50 : (Math.random() > 0.5 ? -30 : canvas.width + 30);
    let y = Math.random() * canvas.height;
    enemies.push({
        x: x, y: y,
        hp: isElite ? 100 : 40,
        size: 20,
        lastFired: 0,
        speed: 1 + Math.random() * 2
    });
}

function shoot(fromX, fromY, targetX, targetY, isEnemy) {
    const weapon = weapons[player.weapon];
    const angle = Math.atan2(targetY - fromY, targetX - fromX);
    const count = isEnemy ? 1 : weapon.count;
    const spread = isEnemy ? 0 : weapon.spread;

    for (let i = 0; i < count; i++) {
        const finalAngle = angle + (Math.random() - 0.5) * spread;
        const b = {
            x: fromX, y: fromY,
            vx: Math.cos(finalAngle) * (isEnemy ? 5 : weapon.bulletSpeed),
            vy: Math.sin(finalAngle) * (isEnemy ? 5 : weapon.bulletSpeed),
            damage: isEnemy ? 10 : weapon.damage,
            isEnemy: isEnemy
        };
        if (isEnemy) enemyBullets.push(b); else bullets.push(b);
    }
}

// --- メインループ ---
function update(time) {
    if (gameState === 'gameover' || gameState === 'win') return;

    // プレイヤー移動
    if (keys['w'] && player.y > 0) player.y -= player.speed;
    if (keys['s'] && player.y < canvas.height) player.y += player.speed;
    if (keys['a'] && player.x > 0) player.x -= player.speed;
    if (keys['d'] && player.x < canvas.width) player.x += player.speed;

    // 射撃
    if (isMouseDown && time - lastFired > weapons[player.weapon].fireRate) {
        shoot(player.x, player.y, mouse.x, mouse.y, false);
        lastFired = time;
    }

    // フェーズ判定
    if (gameState === 'infiltrate' && player.x > 700) {
        gameState = 'defense';
        document.getElementById('status').innerText = "DEFEND THE BASE! (30s)";
        defenseTimer = 30;
        let startTime = Date.now();
        let itv = setInterval(() => {
            defenseTimer--;
            if (defenseTimer <= 0) {
                clearInterval(itv);
                gameState = 'win';
                document.getElementById('status').innerText = "MISSION COMPLETE!";
            }
        }, 1000);
    }

    // 敵の生成
    spawnTimer++;
    let rate = gameState === 'defense' ? 30 : 80;
    if (spawnTimer > rate) {
        spawnEnemy();
        spawnTimer = 0;
    }

    // 弾の更新
    [bullets, enemyBullets].forEach(list => {
        for (let i = list.length - 1; i >= 0; i--) {
            list[i].x += list[i].vx;
            list[i].y += list[i].vy;
            if (list[i].x < 0 || list[i].x > canvas.width || list[i].y < 0 || list[i].y > canvas.height) {
                list.splice(i, 1);
            }
        }
    });

    // 敵の挙動
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        // プレイヤーに近づく
        if (dist > 200) {
            e.x += (dx/dist) * e.speed;
            e.y += (dy/dist) * e.speed;
        }

        // 敵の射撃
        if (time - e.lastFired > 1500) {
            shoot(e.x, e.y, player.x, player.y, true);
            e.lastFired = time;
        }

        // 弾との当たり判定 (プレイヤーの弾 -> 敵)
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            if (Math.hypot(e.x - b.x, e.y - b.y) < e.size) {
                e.hp -= b.damage;
                bullets.splice(j, 1);
                if (e.hp <= 0) {
                    enemies.splice(i, 1);
                    break;
                }
            }
        }
    }

    // 敵の弾 -> プレイヤー
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        let b = enemyBullets[i];
        if (Math.hypot(player.x - b.x, player.y - b.y) < player.size) {
            player.hp -= b.damage;
            enemyBullets.splice(i, 1);
            document.getElementById('hp').innerText = Math.max(0, player.hp);
            if (player.hp <= 0) {
                gameState = 'gameover';
                document.getElementById('status').innerText = "WASTED - GAME OVER";
            }
        }
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 本部エリアの描画
    if (gameState === 'infiltrate') {
        ctx.fillStyle = "rgba(255, 0, 0, 0.2)";
        ctx.fillRect(700, 0, 100, 600);
        ctx.fillStyle = "white";
        ctx.fillText("OBJECTIVE: BASE", 710, 300);
    } else if (gameState === 'defense') {
        ctx.fillStyle = "rgba(255, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "40px sans-serif";
        ctx.fillStyle = "white";
        ctx.fillText(`SURVIVE: ${defenseTimer}s`, canvas.width/2 - 100, 50);
    }

    // プレイヤー描画
    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
    ctx.fill();

    // 敵描画
    ctx.fillStyle = "red";
    enemies.forEach(e => {
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
        ctx.fill();
        // 簡易HPバー
        ctx.fillStyle = "green";
        ctx.fillRect(e.x - 10, e.y - 30, (e.hp/40)*20, 5);
        ctx.fillStyle = "red";
    });

    // 弾描画
    ctx.fillStyle = "yellow";
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));
    ctx.fillStyle = "orange";
    enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, 6, 6));

    if (gameState === 'win') {
        ctx.fillStyle = "gold";
        ctx.font = "60px sans-serif";
        ctx.fillText("MISSION COMPLETE", 100, 300);
    }
    if (gameState === 'gameover') {
        ctx.fillStyle = "red";
        ctx.font = "60px sans-serif";
        ctx.fillText("GAME OVER", 200, 300);
    }
}

requestAnimationFrame(update);
</script>
</body>
</html>
