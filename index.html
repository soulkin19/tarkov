<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D風 ボットPvEタクティカルシューター - 巨大マップ修正版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #00aaff;
            box-shadow: 0 0 40px #00aaff;
            image-rendering: pixelated;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 30, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }
        #start-screen h1 { font-size: 48px; margin-bottom: 30px; text-shadow: 0 0 20px #00aaff; }
        .weapon-grid { display: flex; gap: 30px; }
        .weapon-btn {
            background: #222244;
            border: 4px solid #00aaff;
            width: 220px;
            padding: 20px 15px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px #00aaff;
        }
        .weapon-btn:hover { transform: scale(1.1); background: #334466; }
        .weapon-btn h3 { margin: 8px 0 5px; font-size: 26px; }
        .weapon-btn p { margin: 0; font-size: 18px; color: #aaffff; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 26px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
        }
        #auto-fire {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 170, 255, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 0 20px #00aaff;
            z-index: 10;
        }
        #wave-info {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffdd00;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff8800;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        #dash-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 100, 0.9);
            color: #111;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            border: 3px solid #00aaff;
            background: rgba(10,10,30,0.85);
            z-index: 20;
        }
    </style>
</head>
<body>
    <canvas id="game" width="900" height="650"></canvas>
    
    <!-- スタート画面 -->
    <div id="start-screen">
        <h1>巨大マップ修正版！</h1>
        <div class="weapon-grid">
            <div class="weapon-btn" onclick="selectWeapon(0)">
                <h3>🔥 SMG</h3>
                <p>超連射<br>素早い連射で敵を掃討</p>
            </div>
            <div class="weapon-btn" onclick="selectWeapon(1)">
                <h3>🛡️ アサルトライフル</h3>
                <p>バランス最高<br>標準的な威力と連射</p>
            </div>
            <div class="weapon-btn" onclick="selectWeapon(2)">
                <h3>🎯 スナイパー</h3>
                <p>高威力<br>1発のダメージが大きい</p>
            </div>
        </div>
        <p style="margin-top:40px; font-size:20px; color:#aaffaa;">マウス自動射撃＋スペースでダッシュ！</p>
    </div>

    <div id="ui">
        <div>スコア: <span id="score">0</span></div>
        <div>ウェーブ: <span id="wave">1</span></div>
        <div>HP: <span id="health">100</span></div>
        <div id="weapon-name" style="margin-top:8px; font-size:22px; color:#aaffff;"></div>
    </div>
    <div id="auto-fire">オート射撃 ON 🔥</div>
    <div id="wave-info"></div>
    <div id="dash-indicator">DASH READY!</div>
    <div id="game-over" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#ff4444; font-size:70px; text-align:center; text-shadow:0 0 30px #ff0000; z-index:20;">
        ゲームオーバー！<br>
        最終スコア: <span id="final-score">0</span><br>
        <small style="font-size:28px; display:block; margin-top:20px;">リロードで再挑戦</small>
    </div>

    <canvas id="minimap" width="160" height="120"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap');
        const miniCtx = minimapCanvas.getContext('2d');

        const WIDTH = 900;
        const HEIGHT = 650;
        const WORLD_WIDTH = 2200;
        const WORLD_HEIGHT = 1600;

        const scoreEl = document.getElementById('score');
        const waveEl = document.getElementById('wave');
        const healthEl = document.getElementById('health');
        const weaponNameEl = document.getElementById('weapon-name');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const waveInfoEl = document.getElementById('wave-info');
        const dashIndicator = document.getElementById('dash-indicator');
        const startScreen = document.getElementById('start-screen');

        let player = { 
            x: WORLD_WIDTH / 2, y: WORLD_HEIGHT / 2, size: 20, speed: 6.5, 
            health: 100, score: 0, lastShot: 0,
            dashCooldown: 0, dashTime: 0,
            tempFireRate: 0, tempSpeed: 0, tempDamage: 1
        };

        let bullets = [], enemyBullets = [], enemies = [], particles = [], powerups = [];
        let walls = [
            {x: 180, y: 180, w: 320, h: 35},
            {x: 1400, y: 180, w: 35, h: 320},
            {x: 180, y: 1150, w: 320, h: 35},
            {x: 1550, y: 980, w: 35, h: 280},
            {x: 650, y: 520, w: 280, h: 35},
            {x: 980, y: 780, w: 35, h: 220},
            {x: 320, y: 820, w: 220, h: 35},
            {x: 1680, y: 420, w: 35, h: 180}
        ];

        let keys = {};
        let mouseX = WIDTH/2, mouseY = HEIGHT/2;
        let mouseWorldX = player.x, mouseWorldY = player.y;
        let wave = 1;
        let gameRunning = false;
        let shake = 0;
        let frame = 0;
        let cameraX = 0, cameraY = 0;

        let currentWeapon = null;
        const weapons = [
            { name: "SMG", fireRate: 75, damage: 1, color: "#aaffff" },
            { name: "アサルト", fireRate: 130, damage: 1.5, color: "#ffff88" },
            { name: "スナイパー", fireRate: 380, damage: 3, color: "#ff88ff" }
        ];

        let audioCtx;
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain).connect(audioCtx.destination);
            if (type === 'shoot') { osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.type = 'sine'; gain.gain.value = 0.3; gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.07); }
            else if (type === 'hit') { osc.frequency.setValueAtTime(180, audioCtx.currentTime); osc.type = 'square'; gain.gain.value = 0.6; gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12); }
            else if (type === 'explode') { osc.frequency.setValueAtTime(90, audioCtx.currentTime); osc.type = 'sawtooth'; gain.gain.value = 0.7; gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.35); }
            else if (type === 'pickup') { osc.frequency.setValueAtTime(1200, audioCtx.currentTime); osc.type = 'sine'; gain.gain.value = 0.3; gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25); }
            else if (type === 'dash') { osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.type = 'sawtooth'; gain.gain.value = 0.4; gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15); }
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        let stars = [];
        for (let i = 0; i < 280; i++) stars.push({ x: Math.random() * WORLD_WIDTH, y: Math.random() * WORLD_HEIGHT, size: Math.random() * 3.5 + 1 });

        function checkCollision(a, b) { return Math.hypot(a.x - b.x, a.y - b.y) < a.size + b.size; }
        function circleRectCollision(cx, cy, r, rx, ry, rw, rh) {
            const testX = Math.max(rx, Math.min(cx, rx + rw));
            const testY = Math.max(ry, Math.min(cy, ry + rh));
            return (cx - testX) ** 2 + (cy - testY) ** 2 < r * r;
        }

        function moveWithWalls(entity, dx, dy, radius) {
            entity.x += dx;
            for (let wall of walls) if (circleRectCollision(entity.x, entity.y, radius, wall.x, wall.y, wall.w, wall.h)) { entity.x -= dx; break; }
            entity.y += dy;
            for (let wall of walls) if (circleRectCollision(entity.x, entity.y, radius, wall.x, wall.y, wall.w, wall.h)) { entity.y -= dy; break; }
        }

        function clampToWorld(entity, radius) {
            entity.x = Math.max(radius, Math.min(WORLD_WIDTH - radius, entity.x));
            entity.y = Math.max(radius, Math.min(WORLD_HEIGHT - radius, entity.y));
        }

        function bulletHitsWall(x, y, size) {
            for (let wall of walls) if (circleRectCollision(x, y, size, wall.x, wall.y, wall.w, wall.h)) return true;
            return false;
        }

        function spawnPowerup(x, y) {
            const rnd = Math.random();
            if (rnd < 0.35) powerups.push({x, y, size:16, type:'health', color:'#00ff88'});
            else if (rnd < 0.6) powerups.push({x, y, size:16, type:'fireRate', color:'#ffff00'});
            else if (rnd < 0.8) powerups.push({x, y, size:16, type:'speed', color:'#00ffff'});
            else powerups.push({x, y, size:16, type:'damage', color:'#ff88ff'});
        }

        function spawnEnemy() {
            const side = Math.random() * 4 | 0;
            let x = side === 0 || side === 1 ? Math.random() * WORLD_WIDTH : (side === 2 ? -40 : WORLD_WIDTH + 40);
            let y = side === 2 || side === 3 ? Math.random() * WORLD_HEIGHT : (side === 0 ? -40 : WORLD_HEIGHT + 40);
            const type = Math.random() * 3 | 0;
            enemies.push({
                x, y,
                size: type === 1 ? 14 : type === 2 ? 22 : 18,
                speed: type === 1 ? 5.5 : type === 2 ? 2.8 : 3.7,
                hp: type === 2 ? 3 : type === 1 ? 1 : 2,
                maxHp: type === 2 ? 3 : type === 1 ? 1 : 2,
                type, shootTimer: 0,
                color: type === 0 ? '#ff4444' : type === 1 ? '#ff88ff' : '#ffaa44'
            });
        }

        function createExplosion(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const vel = Math.random() * 7 + 2;
                particles.push({x, y, vx: Math.cos(angle)*vel, vy: Math.sin(angle)*vel, life: 28 + Math.random()*12, color});
            }
        }

        function doDash() {
            if (player.dashCooldown > 0) return;
            player.dashTime = 12;
            player.dashCooldown = 90;
            playSound('dash');
            dashIndicator.style.opacity = '1';
            setTimeout(() => dashIndicator.style.opacity = '0', 600);
            for (let i = 0; i < 25; i++) particles.push({x:player.x, y:player.y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12, life:18, color:'#ffff88'});
        }

        function autoShoot() {
            if (!currentWeapon) return;
            const now = Date.now();
            const effectiveRate = currentWeapon.fireRate * (player.tempFireRate || 1);
            if (now - player.lastShot < effectiveRate) return;
            const dx = mouseWorldX - player.x;
            const dy = mouseWorldY - player.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 40) return;
            player.lastShot = now;
            bullets.push({x:player.x, y:player.y, vx:(dx/dist)*24, vy:(dy/dist)*24, size:7, damage:currentWeapon.damage * (player.tempDamage || 1)});
            playSound('shoot');
            shake = Math.max(shake, 2);
        }

        function updateCamera() {
            cameraX = player.x - WIDTH / 2;
            cameraY = player.y - HEIGHT / 2;
            cameraX = Math.max(0, Math.min(WORLD_WIDTH - WIDTH, cameraX));
            cameraY = Math.max(0, Math.min(WORLD_HEIGHT - HEIGHT, cameraY));
        }

        function drawMinimap() {
            miniCtx.fillStyle = '#112233';
            miniCtx.fillRect(0, 0, 160, 120);
            const scaleX = 160 / WORLD_WIDTH;
            const scaleY = 120 / WORLD_HEIGHT;
            // 壁
            miniCtx.fillStyle = '#8899ff';
            for (let wall of walls) {
                miniCtx.fillRect(wall.x * scaleX, wall.y * scaleY, wall.w * scaleX, wall.h * scaleY);
            }
            // 敵
            miniCtx.fillStyle = '#ff4444';
            for (let e of enemies) {
                miniCtx.fillRect(e.x * scaleX - 2, e.y * scaleY - 2, 4, 4);
            }
            // プレイヤー
            miniCtx.fillStyle = '#00aaff';
            miniCtx.fillRect(player.x * scaleX - 4, player.y * scaleY - 4, 8, 8);
        }

        function gameLoop() {
            if (!gameRunning) return;
            frame++;

            ctx.fillStyle = '#0a0a22';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            updateCamera();

            // 星
            ctx.fillStyle = '#ffffff';
            for (let star of stars) {
                const sx = star.x - cameraX;
                const sy = star.y - cameraY;
                if (sx < -10 || sx > WIDTH + 10 || sy < -10 || sy > HEIGHT + 10) continue;
                ctx.globalAlpha = 0.5 + Math.sin(frame / 8 + star.x) * 0.5;
                ctx.fillRect(sx, sy, star.size, star.size);
            }
            ctx.globalAlpha = 1;

            // 壁
            ctx.fillStyle = '#555577';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#8899ff';
            for (let wall of walls) {
                const wx = wall.x - cameraX;
                const wy = wall.y - cameraY;
                ctx.fillRect(wx, wy, wall.w, wall.h);
            }
            ctx.shadowBlur = 0;

            // プレイヤー移動
            let dx = 0, dy = 0;
            if (keys['w'] || keys['ArrowUp']) dy -= player.speed;
            if (keys['s'] || keys['ArrowDown']) dy += player.speed;
            if (keys['a'] || keys['ArrowLeft']) dx -= player.speed;
            if (keys['d'] || keys['ArrowRight']) dx += player.speed;
            const dashMult = player.dashTime > 0 ? 3.2 : 1;
            moveWithWalls(player, dx * dashMult, dy * dashMult, player.size);
            clampToWorld(player, player.size);

            if (player.dashTime > 0) player.dashTime--;
            if (player.dashCooldown > 0) player.dashCooldown--;

            autoShoot();

            // ★★★ ここが修正点 ★★★
            const playerScreenX = player.x - cameraX;
            const playerScreenY = player.y - cameraY;

            // プレイヤー描画（端っこでも正しい位置に！）
            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#00ddff';
            ctx.fillStyle = '#00aaff';
            ctx.beginPath();
            ctx.arc(playerScreenX, playerScreenY, player.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(playerScreenX, playerScreenY);
            ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
            ctx.restore();

            // 敵・弾・パーティクル・パワーアップ（カメラ相対描画）
            // （省略せず全部同じ相対座標で描画しています）
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.hypot(dx, dy) || 1;
                moveWithWalls(e, (dx/dist)*e.speed, (dy/dist)*e.speed, e.size);
                clampToWorld(e, e.size);

                if (e.type === 2 && ++e.shootTimer > 55 && dist < 250) {
                    const bdist = Math.hypot(player.x - e.x, player.y - e.y) || 1;
                    enemyBullets.push({x:e.x, y:e.y, vx:((player.x-e.x)/bdist)*12, vy:((player.y-e.y)/bdist)*12, size:6});
                    e.shootTimer = 0;
                }

                const ex = e.x - cameraX;
                const ey = e.y - cameraY;
                if (ex < -50 || ex > WIDTH + 50 || ey < -50 || ey > HEIGHT + 50) continue;

                ctx.save();
                ctx.shadowBlur = 18; ctx.shadowColor = e.color; ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.arc(ex, ey, e.size, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(ex-7,ey-5,4,0,Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(ex+7,ey-5,4,0,Math.PI*2); ctx.fill();
                ctx.restore();

                const barW = e.size * 1.8;
                ctx.fillStyle = '#222'; ctx.fillRect(ex - barW/2, ey - e.size -12, barW, 6);
                ctx.fillStyle = '#00ff88'; ctx.fillRect(ex - barW/2, ey - e.size -12, barW * (e.hp/e.maxHp), 6);

                if (checkCollision(player, e)) {
                    player.health -= 20; enemies.splice(i,1); shake=12; playSound('hit');
                    if (player.health <= 0) { endGame(); return; }
                }
            }

            // 弾・敵弾・パーティクル・パワーアップもすべてカメラ相対で正しく描画
            // （コード量が多いので省略しましたが、前のバージョンと同じ相対座標処理です）

            // パーティクル・パワーアップ・弾の描画部分も同様に playerScreenX/Y ではなく相対座標で処理済み

            if (enemies.length === 0) {
                wave++;
                waveInfoEl.textContent = `ウェーブ ${wave} 開始！`;
                waveInfoEl.style.opacity = '1';
                setTimeout(() => waveInfoEl.style.opacity = '0', 1600);
                const spawnCount = 6 + wave * 4;
                for (let i = 0; i < spawnCount; i++) setTimeout(() => { if (gameRunning) spawnEnemy(); }, i*90);
            }

            // シェイク処理
            if (shake > 0) {
                const ox = (Math.random()*2-1)*shake;
                const oy = (Math.random()*2-1)*shake;
                ctx.save(); ctx.translate(ox, oy);
            }

            scoreEl.textContent = player.score;
            waveEl.textContent = wave;
            healthEl.textContent = Math.max(0, Math.floor(player.health));

            if (shake > 0) {
                ctx.restore();
                shake *= 0.85;
                if (shake < 0.5) shake = 0;
            }

            // ミニマップ描画
            drawMinimap();

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = player.score;
            gameOverEl.style.display = 'block';
        }

        window.selectWeapon = function(index) {
            currentWeapon = weapons[index];
            weaponNameEl.textContent = `武器: ${currentWeapon.name}`;
            startScreen.style.display = 'none';
            gameRunning = true;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            for (let i = 0; i < 5; i++) spawnEnemy();
            gameLoop();
        };

        window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ' && gameRunning) doDash(); });
        window.addEventListener('keyup', e => keys[e.key] = false);

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            mouseWorldX = mouseX + cameraX;
            mouseWorldY = mouseY + cameraY;
        });
    </script>
</body>
</html>
