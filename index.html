<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Online - Tactical Pro Full-Spec</title>
    <style>
        * { touch-action: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #f0e68c; font-family: 'Arial Black', sans-serif; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; background-color: #eddfb3; }
        
        #setup { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; padding: 20px; text-align: center; overflow-y: auto; }
        .btn { padding: 12px 20px; margin: 8px; font-size: 14px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; transition: 0.2s; }
        .selected { border: 4px solid #f1c40f !important; box-shadow: 0 0 15px #f1c40f; }
        .opt-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .sys-btn { background: #2c3e50; color: white; width: 160px; text-align: left; }
        .sys-btn small { font-weight: normal; font-size: 10px; display: block; opacity: 0.8; }
        .label { font-size: 12px; color: #f1c40f; margin-bottom: 5px; text-transform: uppercase; }

        #ui { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.85); padding: 10px; border-radius: 8px; border: 2px solid #555; min-width: 170px; pointer-events: none; z-index: 10; }
        .bar-bg { width: 100%; height: 6px; background: #ccc; margin-top: 4px; border-radius: 3px; overflow: hidden; }
        #gadget-bar { width: 0%; height: 100%; background: #8e44ad; }
        #defense-bar { width: 0%; height: 100%; background: #2980b9; }

        /* キルログを画面右上に配置 */
        #killLog { position: absolute; top: 10px; right: 10px; color: #c0392b; font-size: 14px; text-shadow: 1px 1px 0 #fff; text-align: right; width: auto; font-weight: bold; pointer-events: none; z-index: 60; }

        #mobile-controls { display: none; position: absolute; inset: 0; pointer-events: none; z-index: 20; }
        #stick-area { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.2); }
        #stick { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%); }
        .action-btn { position: absolute; width: 70px; height: 70px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; pointer-events: auto; font-size: 12px; border: 2px solid #fff; }
        #btn-fire { bottom: 130px; right: 40px; width: 90px; height: 90px; background: rgba(192, 57, 43, 0.7); font-size: 18px; }
        #btn-gadget { bottom: 50px; right: 140px; background: rgba(142, 68, 173, 0.7); }
        #btn-def { bottom: 50px; right: 40px; background: rgba(41, 128, 185, 0.7); }
        
        .ammo-selector { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .ammo-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.6); color: #fff; border: 2px solid #f1c40f; border-radius: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:#f1c40f;">TANK ONLINE: TACTICAL</h1>
        
        <div class="label">戦車タイプ選択</div>
        <div class="opt-group">
            <button id="type-heavy" class="btn sys-btn">重戦車<small>HP:150 / 高火力</small></button>
            <button id="type-medium" class="btn sys-btn selected">中戦車<small>HP:100 / 標準</small></button>
            <button id="type-light" class="btn sys-btn">軽戦車<small>HP:60 / 高速</small></button>
        </div>

        <div class="label">セカンダリ武装 [Q]</div>
        <div class="opt-group">
            <button id="def-1" class="btn sys-btn selected">誘導ミサイル<small>マウス追従</small></button>
            <button id="def-2" class="btn sys-btn">対空機銃<small>迎撃連射</small></button>
            <button id="def-3" class="btn sys-btn">タクティカルスモーク<small>自分専用・直線壁</small></button>
            <button id="def-4" class="btn sys-btn">近接信管弾<small>自動爆発</small></button>
            <button id="def-5" class="btn sys-btn">ワイヤートラップ<small>超減速地帯</small></button>
        </div>

        <button id="start-game" class="btn" style="background:#f1c40f; color:#000; width:300px; font-size:20px; margin-top:20px;">BATTLE START</button>
    </div>

    <div id="ui">
        <div id="hpDisplay" style="font-size:18px; font-weight:bold;">HP: 100</div>
        <div id="weaponDisplay" style="font-size:13px;">120mm榴弾</div>
        <div style="font-size:11px; margin-top:5px;">ガジェット [R] リペア</div>
        <div class="bar-bg"><div id="gadget-bar"></div></div>
        <div style="font-size:11px; margin-top:5px;">セカンダリ武装 [Q]</div>
        <div class="bar-bg"><div id="defense-bar"></div></div>
    </div>

    <div id="killLog"></div>

    <div id="mobile-controls">
        <div id="stick-area"><div id="stick"></div></div>
        <div id="btn-fire" class="action-btn">FIRE</div>
        <div id="btn-gadget" class="action-btn">R</div>
        <div id="btn-def" class="action-btn">Q</div>
        <div class="ammo-selector" id="ammo-list"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const worldWidth = 2000, worldHeight = 1500;
        const HUB_NAME = "tank_v2_tactical_pro_2026"; 

        const tankSpecs = {
            'heavy':  { hp: 150, maxHp: 150, speed: 0.45, powerMult: 2.0, reloadMult: 1.8, size: 1.75, color: '#1a2a1a' },
            'medium': { hp: 100, maxHp: 100, speed: 0.7,  powerMult: 1.0, reloadMult: 1.0, size: 1.0,  color: '#2d5a27' },
            'light':  { hp: 60,  maxHp: 60,  speed: 1.3,  powerMult: 0.2, reloadMult: 0.2, size: 0.4,  color: '#4a7c44' }
        };

        const ammoTypes = {
            '1': { name: "120mm榴弾", power: 8, reload: 20, speed: 11, color: "#e67e22", isExplosive: true },
            '2': { name: "120mm徹甲弾", power: 22, reload: 25, bounce: true, speed: 13, color: "#34495e" },
            '3': { name: "120mmAPFSDS", power: 35, reload: 125, speed: 55, color: "#2c3e50" },
            '4': { name: "40mmグレネード", power: 6, reload: 12, bounce: true, speed: 8, color: "#f1c40f" },
            '9': { name: "多弾頭榴弾", power: 15, reload: 60, speed: 10, color: "#d35400", isExplosive: true, isCluster: true },
            '12': { name: "スモーク弾", power: 0, reload: 40, speed: 14, color: "#bdc3c7", isSmokeShell: true },
            '23': { name: "バースト機関砲", power: 4, reload: 50, speed: 16, color: "#7f8c8d", isBurst: true }
        };

        const player = {
            id: "P-" + Math.random().toString(36).substr(2, 5),
            type: 'medium', x: 0, y: 0, angle: 0, turretAngle: 0, vx: 0, vy: 0, hp: 100, maxHp: 100,
            reloading: 0, maxReload: 0, currentAmmo: '1', name: "Guest",
            gadgetCD: 0, repairPool: 0,
            defense: 1, defenseCD: 0,
            engineBroken: 0, inOwnSmoke: false, shake: 0,
            burstLeft: 0, burstTimer: 0
        };

        const players = {}, shells = [], explosions = [], smokes = [], keys = {};
        let isMobileMode = false;

        const walls = [
            {x: 0, y: 0, w: worldWidth, h: 20}, {x: 0, y: worldHeight-20, w: worldWidth, h: 20},
            {x: 0, y: 0, w: 20, h: worldHeight}, {x: worldWidth-20, y: 0, w: 20, h: worldHeight},
            {x: worldWidth/2-200, y: worldHeight/2-280, w: 150, h: 40}, {x: worldWidth/2+50, y: worldHeight/2-280, w: 150, h: 40},
            {x: worldWidth/2-200, y: worldHeight/2+240, w: 150, h: 40}, {x: worldWidth/2+50, y: worldHeight/2+240, w: 150, h: 40},
            {x: 400, y: 350, w: 30, h: 250}, {x: 300, y: 450, w: 250, h: 30},
            {x: worldWidth-430, y: 350, w: 30, h: 250}, {x: worldWidth-550, y: 450, w: 250, h: 30},
            {x: worldWidth/2-20, y: 300, w: 40, h: 200}, {x: 600, y: worldHeight/2-20, w: 200, h: 40}
        ];

        const ammoList = document.getElementById('ammo-list');
        Object.keys(ammoTypes).forEach(key => {
            const btn = document.createElement('div');
            btn.className = 'ammo-btn'; btn.innerText = key;
            btn.onclick = () => player.currentAmmo = key;
            ammoList.appendChild(btn);
        });

        let stickData = { active: false, x: 0, y: 0 };
        const stickEl = document.getElementById('stick'), stickArea = document.getElementById('stick-area');
        stickArea.addEventListener('touchstart', (e) => { stickData.active = true; handleStick(e); });
        stickArea.addEventListener('touchmove', (e) => { if(stickData.active) { e.preventDefault(); handleStick(e); } }, {passive:false});
        stickArea.addEventListener('touchend', () => { stickData.active = false; stickData.x = 0; stickData.y = 0; stickEl.style.transform = `translate(-50%, -50%)`; });

        function handleStick(e) {
            const touch = e.touches[0], rect = stickArea.getBoundingClientRect();
            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
            const dx = touch.clientX - cx, dy = touch.clientY - cy;
            const dist = Math.min(60, Math.hypot(dx, dy)), angle = Math.atan2(dy, dx);
            stickData.x = (Math.cos(angle) * dist) / 60; stickData.y = (Math.sin(angle) * dist) / 60;
            stickEl.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
        }

        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); keys[' '] = true; });
        document.getElementById('btn-fire').addEventListener('touchend', () => keys[' '] = false);
        document.getElementById('btn-gadget').addEventListener('touchstart', (e) => { e.preventDefault(); useGadget(); });
        document.getElementById('btn-def').addEventListener('touchstart', (e) => { e.preventDefault(); useDefense(); });

        function isPointInWall(x, y, padding = 25) {
            return walls.some(w => x + padding > w.x && x - padding < w.x + w.w && y + padding > w.y && y - padding < w.y + w.h);
        }

        function respawn() {
            let safe = false;
            while (!safe) {
                player.x = Math.random() * (worldWidth - 200) + 100;
                player.y = Math.random() * (worldHeight - 200) + 100;
                if (!isPointInWall(player.x, player.y, 45)) safe = true;
            }
            const spec = tankSpecs[player.type];
            player.hp = spec.hp; player.maxHp = spec.maxHp;
            player.vx = 0; player.vy = 0; player.engineBroken = 0; player.repairPool = 0;
            // デッドオーバーレイ削除につき、ここでの非表示処理も削除
        }

        function setupSelect(id) {
            document.getElementById(id).onclick = () => {
                const parts = id.split('-');
                if(parts[0] === 'type') player.type = parts[1];
                if(parts[0] === 'def') player.defense = parseInt(parts[1]);
                const btns = document.getElementById(id).parentElement.querySelectorAll('.btn');
                btns.forEach(b => b.classList.remove('selected'));
                document.getElementById(id).classList.add('selected');
            };
        }
        ['type-heavy','type-medium','type-light','def-1','def-2','def-3','def-4','def-5'].forEach(setupSelect);

        document.getElementById('start-game').onclick = () => {
            player.name = prompt("名前を入力", "T34") || "Guest";
            document.getElementById('setup').style.display = 'none';
            if('ontouchstart' in window) { isMobileMode = true; document.getElementById('mobile-controls').style.display = 'block'; }
            respawn(); initSocket(); requestAnimationFrame(gameLoop);
        };

        let socket;
        function initSocket() {
            socket = new WebSocket('wss://cloud.achex.ca/tank_tactical_pro_full');
            socket.onopen = () => {
                socket.send(JSON.stringify({auth: player.id, password: "pass"}));
                socket.send(JSON.stringify({joinHub: HUB_NAME}));
            };
            socket.onmessage = (e) => {
                const raw = JSON.parse(e.data); if (!raw.msg) return;
                const data = JSON.parse(raw.msg);
                if (data.type === 'move') players[data.id] = {...data, lastUpdate: Date.now()};
                if (data.type === 'fire') shells.push(data.shell);
                if (data.type === 'boom') createExplosion(data.x, data.y, data.power, data.ownerName, data.weaponName, false);
                if (data.type === 'kill') showKillLog(data.victim, data.attacker, data.weaponName);
                if (data.type === 'smokePoint') spawnSmokePoint(data.x, data.y, data.ownerId);
                if (data.type === 'smokeLine') spawnSmokeLine(data.x, data.y, data.angle, data.ownerId);
            };
        }

        function spawnSmokePoint(x, y, ownerId) {
            for(let i=0; i<3; i++) {
                smokes.push({ x: x+(Math.random()-0.5)*20, y: y+(Math.random()-0.5)*20, r: 80, life: 400, ownerId: ownerId });
            }
        }

        function spawnSmokeLine(x, y, angle, ownerId) {
            const length = 12, spacing = 45;
            for (let i = 0; i < length; i++) {
                smokes.push({
                    x: x + Math.cos(angle) * i * spacing,
                    y: y + Math.sin(angle) * i * spacing,
                    r: 65, life: 450, ownerId: ownerId
                });
            }
        }

        function useGadget() {
            if(player.gadgetCD > 0) return;
            player.repairPool = 30; 
            player.gadgetCD = 600;
        }

        function useDefense() {
            if(player.defenseCD > 0) return;
            const tAngle = player.turretAngle;

            if(player.defense === 1) {
                const s = { x: player.x, y: player.y, vx: Math.cos(tAngle)*6, vy: Math.sin(tAngle)*6, power: 40, color: "#c0392b", isMissile: true, isExplosive: true, owner: player.id, ownerName: player.name, weaponName: "ミサイル", life: 500 };
                shells.push(s); socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'fire', shell:s})}));
                player.defenseCD = 500;
            } else if(player.defense === 2) {
                player.defenseCD = 200;
                for(let i=0; i<12; i++) {
                    setTimeout(() => {
                        const s = { x: player.x, y: player.y, vx: Math.cos(tAngle + (Math.random()-0.5)*0.15)*22, vy: Math.sin(tAngle + (Math.random()-0.5)*0.15)*22, power: 2, color: "#f1c40f", owner: player.id, life: 45, weaponName: "対空機銃" };
                        shells.push(s);
                    }, i * 40);
                }
            } else if(player.defense === 3) {
                spawnSmokeLine(player.x, player.y, tAngle, player.id);
                socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'smokeLine', x: player.x, y: player.y, angle: tAngle, ownerId: player.id})}));
                player.defenseCD = 600;
            } else if(player.defense === 4) {
                const s = { x: player.x, y: player.y, vx: Math.cos(tAngle)*14, vy: Math.sin(tAngle)*14, power: 18, color: "#2ecc71", isProxy: true, isExplosive: true, owner: player.id, ownerName: player.name, weaponName: "近接信管弾", life: 180 };
                shells.push(s); socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'fire', shell:s})}));
                player.defenseCD = 350;
            } else if(player.defense === 5) {
                const s = { x: player.x, y: player.y, vx: 0, vy: 0, power: 0, color: "rgba(52, 73, 94, 0.4)", isWire: true, owner: player.id, life: 800, weaponName: "ワイヤートラップ" };
                shells.push(s); 
                socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'fire', shell:s})}));
                player.defenseCD = 450;
            }
        }

        function fireShell(ammoKey) {
            const spec = tankSpecs[player.type];
            const a = ammoTypes[ammoKey];
            const s = { 
                x: player.x + Math.cos(player.turretAngle)*45, y: player.y + Math.sin(player.turretAngle)*45, 
                vx: Math.cos(player.turretAngle)*a.speed, vy: Math.sin(player.turretAngle)*a.speed, 
                power: a.power * spec.powerMult, bounce: a.bounce, color: a.color, 
                isExplosive: a.isExplosive, isCluster: a.isCluster, isSmokeShell: a.isSmokeShell,
                owner: player.id, ownerName: player.name, weaponName: a.name, life: 200, bCount: 3 
            };
            shells.push(s);
            socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'fire', shell:s})}));
            player.vx -= Math.cos(player.turretAngle) * (s.power * 0.15);
            player.vy -= Math.sin(player.turretAngle) * (s.power * 0.15);
        }

        window.onkeydown = (e) => { 
            keys[e.key] = true; 
            if(ammoTypes[e.key]) player.currentAmmo = e.key;
            if(e.key.toLowerCase()==='r') useGadget();
            if(e.key.toLowerCase()==='q') useDefense();
        };
        window.onkeyup = (e) => keys[e.key] = false;

        function createExplosion(x, y, power, ownerName, weaponName, isOwner) {
            // 爆破エフェクトの配列へのプッシュを削除し、ロジックのみ残す
            if (isOwner) {
                socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'boom', x, y, power, ownerName, weaponName})}));
                if (Math.hypot(player.x - x, player.y - y) < 85) processDamage(power * 0.8, x, y, ownerName, weaponName);
            }
        }

        function processDamage(power, hitX, hitY, ownerName, weaponName) {
            player.hp -= power; player.shake = Math.min(30, power);
            const angleToHit = Math.atan2(hitY - player.y, hitX - player.x);
            let diff = angleToHit - player.angle;
            while(diff < -Math.PI) diff += Math.PI*2; while(diff > Math.PI) diff -= Math.PI*2;
            player.engineBroken = (Math.abs(diff) > 2.0) ? 300 : Math.max(player.engineBroken, 40);
            if (player.hp <= 0) {
                // デッドオーバーレイ表示処理を削除
                createExplosion(player.x, player.y, 80, "SYSTEM", "FATAL", true);
                socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'kill', victim:player.name, attacker:ownerName, weaponName:weaponName})}));
                setTimeout(respawn, 2500);
            }
        }

        function update() {
            const spec = tankSpecs[player.type];
            const inWire = shells.some(s => s.isWire && Math.hypot(player.x - s.x, player.y - s.y) < 150);
            let moveSpeed = (player.engineBroken > 0 ? 0.2 : spec.speed);
            if (inWire) moveSpeed *= 0.25;

            if (isMobileMode && stickData.active) {
                const targetAngle = Math.atan2(stickData.y, stickData.x);
                player.angle = targetAngle; player.turretAngle = targetAngle;
                player.vx += Math.cos(targetAngle) * Math.hypot(stickData.x, stickData.y) * moveSpeed;
                player.vy += Math.sin(targetAngle) * Math.hypot(stickData.x, stickData.y) * moveSpeed;
            } else {
                if (keys['ArrowUp']) { player.vx += Math.cos(player.angle)*moveSpeed; player.vy += Math.sin(player.angle)*moveSpeed; }
                if (keys['ArrowDown']) { player.vx -= Math.cos(player.angle)*moveSpeed*0.5; player.vy -= Math.sin(player.angle)*moveSpeed*0.5; }
                if (keys['ArrowLeft']) { player.angle -= 0.045; player.turretAngle -= 0.045; }
                if (keys['ArrowRight']) { player.angle += 0.045; player.turretAngle += 0.045; }
                if (keys['a']) player.turretAngle -= 0.05; if (keys['d']) player.turretAngle += 0.05;
            }

            player.vx *= 0.91; player.vy *= 0.91;
            if (!isPointInWall(player.x + player.vx, player.y + player.vy, 22 * spec.size)) { player.x += player.vx; player.y += player.vy; }

            player.inOwnSmoke = smokes.some(sm => sm.ownerId === player.id && Math.hypot(player.x - sm.x, player.y - sm.y) < sm.r);
            if(player.repairPool > 0) { const amt = 0.15; player.hp = Math.min(player.maxHp, player.hp + amt); player.repairPool -= amt; }

            if(player.reloading > 0) player.reloading--;
            if(player.gadgetCD > 0) player.gadgetCD--;
            if(player.defenseCD > 0) player.defenseCD--;
            if(player.engineBroken > 0) player.engineBroken--;
            if(player.shake > 0) player.shake *= 0.9;

            if (player.burstLeft > 0 && player.burstTimer-- <= 0) {
                fireShell(player.currentAmmo);
                player.burstLeft--; player.burstTimer = 6;
            }

            if (keys[' '] && player.reloading <= 0 && player.hp > 0) {
                const a = ammoTypes[player.currentAmmo];
                if (a.isBurst) { player.burstLeft = 3; player.burstTimer = 0; }
                else { fireShell(player.currentAmmo); }
                player.reloading = a.reload * spec.reloadMult; player.maxReload = player.reloading;
            }

            for (let i = shells.length-1; i >= 0; i--) {
                const s = shells[i];
                if (s.isMissile && s.owner === player.id) {
                    let curA = Math.atan2(s.vy, s.vx), diff = player.turretAngle - curA;
                    while(diff < -Math.PI) diff += Math.PI*2; while(diff > Math.PI) diff -= Math.PI*2;
                    s.vx = Math.cos(curA + diff * 0.12) * 8; s.vy = Math.sin(curA + diff * 0.12) * 8;
                }
                if (s.isProxy && s.owner === player.id) {
                    for (let id in players) if (Math.hypot(s.x - players[id].x, s.y - players[id].y) < 65) s.life = 0;
                }
                s.x += s.vx; s.y += s.vy; s.life--;

                const hitW = walls.find(w => s.x > w.x && s.x < w.x + w.w && s.y > w.y && s.y < w.y + w.h);
                if (hitW && !s.isWire) {
                    if (s.bounce && s.bCount-- > 0) { if (s.x - s.vx <= hitW.x || s.x - s.vx >= hitW.x + hitW.w) s.vx *= -1; else s.vy *= -1; }
                    else { s.life = 0; }
                }
                if (s.owner !== player.id && Math.hypot(player.x-s.x, player.y-s.y) < 32 * spec.size && !s.isWire) {
                    if (s.isExplosive) createExplosion(s.x, s.y, s.power, s.ownerName, s.weaponName, true);
                    else processDamage(s.power, s.x, s.y, s.ownerName, s.weaponName);
                    shells.splice(i,1); continue;
                }
                if (s.life <= 0) {
                    if (s.isExplosive) createExplosion(s.x, s.y, s.power, s.ownerName, s.weaponName, s.owner === player.id);
                    if (s.isCluster && s.owner === player.id) {
                        for(let j=0; j<8; j++) shells.push({x:s.x, y:s.y, vx:Math.cos(j)*6, vy:Math.sin(j)*6, power:6, color:s.color, isExplosive:true, owner:s.owner, life:25});
                    }
                    if (s.isSmokeShell && s.owner === player.id) {
                        spawnSmokePoint(s.x, s.y, s.owner);
                        socket?.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({type:'smokePoint', x: s.x, y: s.y, ownerId: s.owner})}));
                    }
                    shells.splice(i,1);
                }
            }
            smokes.forEach((sm, i) => { if(sm.life-- <= 0) smokes.splice(i,1); });
            // 爆破演出更新処理(explosions.forEach)を削除
            if (socket?.readyState === 1) {
                socket.send(JSON.stringify({toH: HUB_NAME, msg: JSON.stringify({
                    type: 'move', id: player.id, x: player.x, y: player.y, angle: player.angle, tAngle: player.turretAngle, 
                    hp: player.hp, name: player.name, eng: (player.engineBroken > 0), hide: player.inOwnSmoke, tankType: player.type
                })}));
            }
            document.getElementById('hpDisplay').innerText = `HP: ${Math.ceil(player.hp)}`;
            document.getElementById('weaponDisplay').innerText = ammoTypes[player.currentAmmo].name;
            document.getElementById('gadget-bar').style.width = (100 - (player.gadgetCD/600)*100) + "%";
            document.getElementById('defense-bar').style.width = (100 - (player.defenseCD/500)*100) + "%";
        }

        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.save();
            if(player.shake > 0) ctx.translate((Math.random()-0.5)*player.shake, (Math.random()-0.5)*player.shake);
            ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);
            ctx.fillStyle = "#e3d5a1"; ctx.fillRect(0,0,worldWidth,worldHeight);
            
            walls.forEach(w => { ctx.fillStyle = "#5d4037"; ctx.fillRect(w.x, w.y, w.w, w.h); });
            smokes.forEach(sm => {
                ctx.fillStyle = `rgba(200, 200, 200, ${Math.min(0.25, sm.life/200)})`;
                ctx.beginPath(); ctx.arc(sm.x, sm.y, sm.r, 0, Math.PI*2); ctx.fill();
            });

            shells.forEach(s => { 
                ctx.fillStyle = s.isWire ? "rgba(52, 73, 94, 0.3)" : s.color;
                ctx.beginPath(); 
                if(s.isWire) {
                    ctx.fillRect(s.x - 150, s.y - 150, 300, 300); 
                } else {
                    ctx.arc(s.x, s.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            const drawT = (t, col) => {
                if(t.hide && t.id !== player.id) return;
                const spec = tankSpecs[t.tankType || 'medium'], s = spec.size;
                ctx.save(); ctx.translate(t.x, t.y);
                if(t.eng) { ctx.fillStyle = "rgba(40,40,40,0.5)"; for(let i=0; i<2; i++) { ctx.beginPath(); ctx.arc((Math.random()-0.5)*30, (Math.random()-0.5)*30, 8, 0, Math.PI*2); ctx.fill(); } }
                ctx.save(); ctx.rotate(t.angle); ctx.fillStyle = col; ctx.fillRect(-22*s,-18*s,44*s,36*s); ctx.strokeRect(-22*s,-18*s,44*s,36*s); ctx.restore();
                ctx.save(); ctx.rotate(t.tAngle || t.turretAngle); ctx.fillStyle = col; ctx.fillRect(-14*s,-14*s,28*s,28*s); ctx.strokeRect(-14*s,-14*s,28*s,28*s);
                ctx.fillStyle="#333"; ctx.fillRect(0,-5*s,40*s,10*s); 
                if(t.id === player.id && player.reloading > 0) {
                    ctx.beginPath(); ctx.arc(55*s, 0, 8, -Math.PI/2, (-Math.PI/2) + (Math.PI*2 * (1 - player.reloading / player.maxReload)));
                    ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 3; ctx.stroke();
                }
                ctx.restore();
                ctx.fillStyle = "black"; ctx.font = `bold 14px Arial`; ctx.textAlign="center"; ctx.fillText(t.name, 0, -45);
                ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(-25,-35,50,5);
                ctx.fillStyle = (t.hp/spec.maxHp) > 0.3 ? "#2ecc71" : "#e74c3c"; ctx.fillRect(-25,-35,50*(t.hp/spec.maxHp),5);
                ctx.restore();
            };

            for (let id in players) if(Date.now()-players[id].lastUpdate < 3000) drawT(players[id], '#c0392b');
            if(player.hp > 0) drawT(player, tankSpecs[player.type].color);

            // 爆破エフェクトの描画処理(explosions.forEach)を削除
            ctx.restore();
        }

        function showKillLog(v, a, w) { 
            const l = document.getElementById('killLog'); 
            l.innerHTML = `<span style="color:#222">${v}</span> <small>destroyed by</small> <span style="color:#c0392b">${a}</span> <br><small>[${w}]</small>`; 
            setTimeout(()=>l.innerText="", 5000); 
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
    })();
    </script>
</body>
</html>
