<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D風 ボットPvEタクティカルシューター - 広々マップ版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #00aaff;
            box-shadow: 0 0 40px #00aaff;
            image-rendering: pixelated;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 30, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }
        #start-screen h1 {
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #00aaff;
        }
        .weapon-grid {
            display: flex;
            gap: 30px;
        }
        .weapon-btn {
            background: #222244;
            border: 4px solid #00aaff;
            width: 220px;
            padding: 20px 15px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px #00aaff;
        }
        .weapon-btn:hover {
            transform: scale(1.1);
            background: #334466;
        }
        .weapon-btn h3 { margin: 8px 0 5px; font-size: 26px; }
        .weapon-btn p { margin: 0; font-size: 18px; color: #aaffff; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 26px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
        }
        #auto-fire {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 170, 255, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 0 20px #00aaff;
            z-index: 10;
        }
        #wave-info {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffdd00;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff8800;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 70px;
            text-align: center;
            display: none;
            text-shadow: 0 0 30px #ff0000;
            z-index: 20;
        }
    </style>
</head>
<body>
    <canvas id="game" width="900" height="650"></canvas>
    
    <!-- スタート画面（武器選択） -->
    <div id="start-screen">
        <h1>武器を選んでスタート！</h1>
        <div class="weapon-grid">
            <div class="weapon-btn" onclick="selectWeapon(0)">
                <h3>🔥 SMG</h3>
                <p>超連射<br>素早い連射で敵を掃討</p>
            </div>
            <div class="weapon-btn" onclick="selectWeapon(1)">
                <h3>🛡️ アサルトライフル</h3>
                <p>バランス最高<br>標準的な威力と連射</p>
            </div>
            <div class="weapon-btn" onclick="selectWeapon(2)">
                <h3>🎯 スナイパー</h3>
                <p>高威力<br>1発のダメージが大きい</p>
            </div>
        </div>
        <p style="margin-top:40px; font-size:20px; color:#aaffaa;">マウスを向けた方向に自動で撃ちます！</p>
    </div>

    <div id="ui">
        <div>スコア: <span id="score">0</span></div>
        <div>ウェーブ: <span id="wave">1</span></div>
        <div>HP: <span id="health">100</span></div>
        <div id="weapon-name" style="margin-top:8px; font-size:22px; color:#aaffff;"></div>
    </div>
    <div id="auto-fire">オート射撃 ON 🔥</div>
    <div id="wave-info"></div>
    <div id="game-over">
        ゲームオーバー！<br>
        最終スコア: <span id="final-score">0</span><br>
        <small style="font-size:28px; display:block; margin-top:20px;">リロードで再挑戦</small>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const waveEl = document.getElementById('wave');
        const healthEl = document.getElementById('health');
        const weaponNameEl = document.getElementById('weapon-name');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const waveInfoEl = document.getElementById('wave-info');
        const startScreen = document.getElementById('start-screen');

        // ゲーム変数（マップを広くした！）
        const WIDTH = 900;
        const HEIGHT = 650;
        let player = { 
            x: WIDTH / 2, 
            y: HEIGHT / 2, 
            size: 20, 
            speed: 6, 
            health: 100, 
            score: 0, 
            lastShot: 0
        };
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let powerups = [];
        
        // 壁配置を広めに調整（マップが広く感じるように）
        let walls = [
            {x: 100, y: 100, w: 260, h: 30},
            {x: 550, y: 100, w: 30, h: 260},
            {x: 100, y: 480, w: 260, h: 30},
            {x: 600, y: 420, w: 30, h: 200},
            {x: 300, y: 280, w: 220, h: 30},
            {x: 720, y: 200, w: 30, h: 160}
        ];
        
        let keys = {};
        let mouseX = WIDTH / 2, mouseY = HEIGHT / 2;
        let wave = 1;
        let gameRunning = false;
        let shake = 0;
        let frame = 0;

        // 武器データ
        let currentWeapon = null;
        const weapons = [
            { name: "SMG", fireRate: 75, damage: 1, color: "#aaffff" },
            { name: "アサルト", fireRate: 130, damage: 1.5, color: "#ffff88" },
            { name: "スナイパー", fireRate: 380, damage: 3, color: "#ff88ff" }
        ];

        let audioCtx;
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain).connect(audioCtx.destination);
            if (type === 'shoot') {
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.type = 'sine';
                gain.gain.value = 0.3;
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.07);
            } else if (type === 'hit') {
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.type = 'square';
                gain.gain.value = 0.6;
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
            } else if (type === 'explode') {
                osc.frequency.setValueAtTime(90, audioCtx.currentTime);
                osc.type = 'sawtooth';
                gain.gain.value = 0.7;
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.35);
            } else if (type === 'pickup') {
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                osc.type = 'sine';
                gain.gain.value = 0.3;
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
            }
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // 背景の星（広くなったマップ用に少し増やしました）
        let stars = [];
        for (let i = 0; i < 180; i++) {
            stars.push({ x: Math.random() * WIDTH, y: Math.random() * HEIGHT, size: Math.random() * 3.5 + 1 });
        }

        function checkCollision(a, b) {
            return Math.hypot(a.x - b.x, a.y - b.y) < a.size + b.size;
        }
        function circleRectCollision(cx, cy, r, rx, ry, rw, rh) {
            const testX = Math.max(rx, Math.min(cx, rx + rw));
            const testY = Math.max(ry, Math.min(cy, ry + rh));
            const dx = cx - testX;
            const dy = cy - testY;
            return (dx * dx + dy * dy) < r * r;
        }

        function moveWithWalls(entity, dx, dy, radius) {
            entity.x += dx;
            for (let wall of walls) {
                if (circleRectCollision(entity.x, entity.y, radius, wall.x, wall.y, wall.w, wall.h)) {
                    entity.x -= dx;
                    break;
                }
            }
            entity.y += dy;
            for (let wall of walls) {
                if (circleRectCollision(entity.x, entity.y, radius, wall.x, wall.y, wall.w, wall.h)) {
                    entity.y -= dy;
                    break;
                }
            }
        }

        // 新機能：画面外に出られないようにする（プレイヤー・敵共通）
        function clampToScreen(entity, radius) {
            entity.x = Math.max(radius, Math.min(WIDTH - radius, entity.x));
            entity.y = Math.max(radius, Math.min(HEIGHT - radius, entity.y));
        }

        // 壁に当たるかチェック（弾丸貫通防止）
        function bulletHitsWall(x, y, size) {
            for (let wall of walls) {
                if (circleRectCollision(x, y, size, wall.x, wall.y, wall.w, wall.h)) {
                    return true;
                }
            }
            return false;
        }

        function spawnEnemy() {
            const side = Math.random() * 4 | 0;
            let x, y;
            if (side === 0) { x = Math.random() * WIDTH; y = -40; }
            else if (side === 1) { x = Math.random() * WIDTH; y = HEIGHT + 40; }
            else if (side === 2) { x = -40; y = Math.random() * HEIGHT; }
            else { x = WIDTH + 40; y = Math.random() * HEIGHT; }

            const type = Math.random() * 3 | 0;
            const enemy = {
                x: x, y: y,
                size: type === 1 ? 14 : type === 2 ? 22 : 18,
                speed: type === 1 ? 5.5 : type === 2 ? 2.8 : 3.7,
                hp: type === 2 ? 3 : type === 1 ? 1 : 2,
                maxHp: type === 2 ? 3 : type === 1 ? 1 : 2,
                type: type,
                shootTimer: 0,
                color: type === 0 ? '#ff4444' : type === 1 ? '#ff88ff' : '#ffaa44'
            };
            enemies.push(enemy);
        }

        function createExplosion(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const vel = Math.random() * 7 + 2;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * vel,
                    vy: Math.sin(angle) * vel,
                    life: 28 + Math.random() * 12,
                    color: color
                });
            }
        }

        function spawnPowerup(x, y) {
            if (Math.random() < 0.4) {
                powerups.push({ x: x, y: y, size: 14, type: 'health' });
            }
        }

        function autoShoot() {
            if (!currentWeapon) return;
            const now = Date.now();
            if (now - player.lastShot < currentWeapon.fireRate) return;
            
            const dx = mouseX - player.x;
            const dy = mouseY - player.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 40) return;
            
            player.lastShot = now;
            bullets.push({
                x: player.x,
                y: player.y,
                vx: (dx / dist) * 24,
                vy: (dy / dist) * 24,
                size: 7,
                damage: currentWeapon.damage
            });
            playSound('shoot');
            shake = Math.max(shake, 2);
        }

        function gameLoop() {
            if (!gameRunning) return;
            frame++;

            ctx.fillStyle = '#0a0a22';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            ctx.fillStyle = '#ffffff';
            for (let star of stars) {
                ctx.globalAlpha = 0.5 + Math.sin(frame / 8 + star.x) * 0.5;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }
            ctx.globalAlpha = 1;

            // 壁描画
            ctx.fillStyle = '#555577';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#8899ff';
            for (let wall of walls) {
                ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
            }
            ctx.shadowBlur = 0;

            // プレイヤー移動 + 画面外防止
            let dx = 0, dy = 0;
            if (keys['w'] || keys['ArrowUp']) dy -= player.speed;
            if (keys['s'] || keys['ArrowDown']) dy += player.speed;
            if (keys['a'] || keys['ArrowLeft']) dx -= player.speed;
            if (keys['d'] || keys['ArrowRight']) dx += player.speed;
            moveWithWalls(player, dx, dy, player.size);
            clampToScreen(player, player.size);   // ← ここで画面外に出られないように！

            // オート射撃
            autoShoot();

            // プレイヤー描画
            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#00ddff';
            ctx.fillStyle = '#00aaff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
            ctx.restore();

            // 敵更新 + 画面外防止
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.hypot(dx, dy) || 1;
                const moveX = (dx / dist) * e.speed;
                const moveY = (dy / dist) * e.speed;
                moveWithWalls(e, moveX, moveY, e.size);
                clampToScreen(e, e.size);   // ← 敵も画面外に出られない！

                if (e.type === 2) {
                    e.shootTimer++;
                    if (e.shootTimer > 55 && dist < 250) {
                        const bdx = player.x - e.x;
                        const bdy = player.y - e.y;
                        const bdist = Math.hypot(bdx, bdy) || 1;
                        enemyBullets.push({ x: e.x, y: e.y, vx: (bdx / bdist) * 12, vy: (bdy / bdist) * 12, size: 6 });
                        e.shootTimer = 0;
                    }
                }

                ctx.save();
                ctx.shadowBlur = 18;
                ctx.shadowColor = e.color;
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#111111';
                ctx.beginPath(); ctx.arc(e.x - 7, e.y - 5, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(e.x + 7, e.y - 5, 4, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                const barW = e.size * 1.8;
                ctx.fillStyle = '#222222';
                ctx.fillRect(e.x - barW / 2, e.y - e.size - 12, barW, 6);
                ctx.fillStyle = '#00ff88';
                ctx.fillRect(e.x - barW / 2, e.y - e.size - 12, barW * (e.hp / e.maxHp), 6);

                if (checkCollision(player, e)) {
                    player.health -= 20;
                    enemies.splice(i, 1);
                    shake = 12;
                    playSound('hit');
                    if (player.health <= 0) { endGame(); return; }
                }
            }

            // プレイヤー弾
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;

                if (bulletHitsWall(b.x, b.y, b.size)) {
                    createExplosion(b.x, b.y, 6, '#ffff88');
                    bullets.splice(i, 1);
                    continue;
                }

                ctx.shadowBlur = 15;
                ctx.shadowColor = '#22ff88';
                ctx.fillStyle = '#22ff88';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();

                if (b.x < 0 || b.x > WIDTH || b.y < 0 || b.y > HEIGHT) {
                    bullets.splice(i, 1); continue;
                }

                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (checkCollision(b, enemies[j])) {
                        enemies[j].hp -= b.damage;
                        bullets.splice(i, 1);
                        playSound('hit');
                        if (enemies[j].hp <= 0) {
                            player.score += 30 + wave * 5;
                            createExplosion(enemies[j].x, enemies[j].y, 32, '#ff8800');
                            spawnPowerup(enemies[j].x, enemies[j].y);
                            playSound('explode');
                            enemies.splice(j, 1);
                        } else {
                            createExplosion(enemies[j].x, enemies[j].y, 8, '#ffff00');
                        }
                        shake = Math.max(shake, 5);
                        break;
                    }
                }
            }

            // 敵弾
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.x += b.vx; b.y += b.vy;

                if (bulletHitsWall(b.x, b.y, b.size)) {
                    enemyBullets.splice(i, 1);
                    continue;
                }

                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ff4444';
                ctx.fillStyle = '#ff6666';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();

                if (b.x < 0 || b.x > WIDTH || b.y < 0 || b.y > HEIGHT) {
                    enemyBullets.splice(i, 1); continue;
                }

                if (checkCollision(player, b)) {
                    player.health -= 16;
                    enemyBullets.splice(i, 1);
                    shake = 15;
                    playSound('hit');
                    if (player.health <= 0) { endGame(); return; }
                }
            }

            // パーティクル
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.96; p.vy *= 0.96;
                p.life--;
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 5, 5);
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1;

            // 回復アイテム
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ff88';
                ctx.fillStyle = '#00ff88';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText('+', p.x - 6, p.y + 6);
                ctx.shadowBlur = 0;

                if (Math.hypot(player.x - p.x, player.y - p.y) < player.size + p.size) {
                    player.health = Math.min(100, player.health + 35);
                    playSound('pickup');
                    powerups.splice(i, 1);
                }
            }

            // 次のウェーブ
            if (enemies.length === 0) {
                wave++;
                waveInfoEl.textContent = `ウェーブ ${wave} 開始！`;
                waveInfoEl.style.opacity = '1';
                setTimeout(() => { waveInfoEl.style.opacity = '0'; }, 1600);

                const spawnCount = 6 + wave * 4;
                for (let i = 0; i < spawnCount; i++) {
                    setTimeout(() => { if (gameRunning) spawnEnemy(); }, i * 90);
                }
            }

            // シェイク
            if (shake > 0) {
                const offsetX = (Math.random() * 2 - 1) * shake;
                const offsetY = (Math.random() * 2 - 1) * shake;
                ctx.save();
                ctx.translate(offsetX, offsetY);
            }

            scoreEl.textContent = player.score;
            waveEl.textContent = wave;
            healthEl.textContent = Math.max(0, Math.floor(player.health));

            if (shake > 0) {
                ctx.restore();
                shake *= 0.85;
                if (shake < 0.5) shake = 0;
            }

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = player.score;
            gameOverEl.style.display = 'block';
        }

        // 武器選択
        window.selectWeapon = function(index) {
            currentWeapon = weapons[index];
            weaponNameEl.textContent = `武器: ${currentWeapon.name}`;
            startScreen.style.display = 'none';
            gameRunning = true;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            for (let i = 0; i < 5; i++) spawnEnemy();
            gameLoop();
        };

        // 入力
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
    </script>
</body>
</html>
