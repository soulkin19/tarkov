<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tactical Infiltration: Overpowered Edition</title>
    <style>
        body { background: #050505; color: #fff; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; margin: 0; }
        canvas { background: #111; display: block; border: none; cursor: crosshair; }
        .ui { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 20px; border-left: 5px solid #0ff; text-align: left; pointer-events: none; min-width: 200px; }
        .timer-ui { position: fixed; top: 20px; right: 20px; font-size: 40px; font-weight: bold; color: #f00; text-shadow: 0 0 10px #f00; }
        #msg { position: fixed; bottom: 20px; width: 100%; font-size: 18px; color: #555; }
    </style>
</head>
<body>
    <div class="ui">
        <div style="font-size: 12px; color: #0ff;">CONDITION</div>
        <div style="font-size: 24px;">HP: <span id="hp">500</span></div>
        <div style="margin-top: 10px; font-size: 12px; color: #0ff;">EQUIPMENT</div>
        <div id="weaponName" style="font-size: 18px;">Special Forces AR</div>
    </div>
    <div id="timerDisplay" class="timer-ui" style="display:none;">TARGET SECURING: 30s</div>
    <div id="msg">WASD to Move | 1-3 to Switch | Auto-Firing to Mouse Cursor</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// マップとカメラの設定
const WORLD_WIDTH = 5000;
const WORLD_HEIGHT = 1000;
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameState = 'infiltrate'; 
let defenseTimer = 30;
let player = { x: 200, y: 500, size: 22, hp: 500, maxHp: 500, speed: 8, weapon: 0 };
let enemies = [];
let bullets = [];
let enemyBullets = [];
let camera = { x: 0, y: 0, shake: 0 };

const weapons = [
    { name: "Spec-Ops AR", fireRate: 100, bulletSpeed: 20, spread: 0.03, count: 1, damage: 60, color: '#0ff' },
    { name: "Devastator Shotgun", fireRate: 350, bulletSpeed: 15, spread: 0.5, count: 12, damage: 25, color: '#f0f' },
    { name: "Gatling Cannon", fireRate: 40, bulletSpeed: 25, spread: 0.1, count: 1, damage: 20, color: '#ff0' }
];

let lastFired = 0;
const keys = {};
let mouse = { x: 0, y: 0 };

window.onkeydown = (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === '1') player.weapon = 0;
    if (e.key === '2') player.weapon = 1;
    if (e.key === '3') player.weapon = 2;
    document.getElementById('weaponName').innerText = weapons[player.weapon].name;
};
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };

function spawnEnemy(isMachineGunner = false) {
    let x = player.x + (Math.random() > 0.5 ? 800 : -800);
    let y = Math.random() * WORLD_HEIGHT;
    if (gameState === 'infiltrate') x = player.x + 900;

    enemies.push({
        x: x, y: y,
        hp: isMachineGunner ? 300 : 80,
        maxHp: isMachineGunner ? 300 : 80,
        size: isMachineGunner ? 35 : 22,
        type: isMachineGunner ? 'heavy' : 'normal',
        lastFired: 0,
        speed: isMachineGunner ? 1.5 : 4,
        fireInterval: isMachineGunner ? 150 : 1200
    });
}

function shoot(fromX, fromY, targetX, targetY, isEnemy, type = 'normal') {
    const angle = Math.atan2(targetY - fromY, targetX - fromX);
    let wp = isEnemy ? (type === 'heavy' ? {count:1, spread:0.2, speed:12, damage:8} : {count:1, spread:0, speed:8, damage:15}) : weapons[player.weapon];

    for (let i = 0; i < wp.count; i++) {
        const finalAngle = angle + (Math.random() - 0.5) * wp.spread;
        bullets.push({
            x: fromX, y: fromY,
            vx: Math.cos(finalAngle) * wp.bulletSpeed,
            vy: Math.sin(finalAngle) * wp.bulletSpeed,
            damage: wp.damage,
            isEnemy: isEnemy,
            color: isEnemy ? (type === 'heavy' ? '#f0f' : '#f44') : wp.color
        });
    }
    if (!isEnemy) camera.shake = 5; // 発砲時の揺れ
}

function update(time) {
    if (gameState === 'gameover' || gameState === 'win') return;

    // 移動ロジック
    if (keys['w'] && player.y > 0) player.y -= player.speed;
    if (keys['s'] && player.y < WORLD_HEIGHT) player.y += player.speed;
    if (keys['a'] && player.x > 0) player.x -= player.speed;
    if (keys['d'] && player.x < WORLD_WIDTH) player.x += player.speed;

    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;
    if (camera.shake > 0) {
        camera.x += (Math.random() - 0.5) * camera.shake;
        camera.y += (Math.random() - 0.5) * camera.shake;
        camera.shake *= 0.9;
    }

    // 自動射撃
    const tx = mouse.x + camera.x;
    const ty = mouse.y + camera.y;
    if (time - lastFired > weapons[player.weapon].fireRate) {
        shoot(player.x, player.y, tx, ty, false);
        lastFired = time;
    }

    // 本部イベント
    if (gameState === 'infiltrate' && player.x > WORLD_WIDTH - 600) {
        gameState = 'defense';
        document.getElementById('timerDisplay').style.display = 'block';
        let itv = setInterval(() => {
            defenseTimer--;
            document.getElementById('timerDisplay').innerText = `TARGET SECURING: ${defenseTimer}s`;
            if (defenseTimer <= 0) { clearInterval(itv); gameState = 'win'; }
        }, 1000);
    }

    // 敵スポーン
    if (Math.random() < (gameState === 'defense' ? 0.12 : 0.04)) {
        spawnEnemy(gameState === 'defense' && Math.random() > 0.4);
    }

    // 弾丸処理
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy;
        
        if (b.isEnemy) {
            if (Math.hypot(player.x - b.x, player.y - b.y) < player.size) {
                player.hp -= b.damage;
                bullets.splice(i, 1);
                document.getElementById('hp').innerText = Math.max(0, player.hp);
                if (player.hp <= 0) gameState = 'gameover';
                continue;
            }
        } else {
            enemies.forEach((e, ei) => {
                if (Math.hypot(e.x - b.x, e.y - b.y) < e.size) {
                    e.hp -= b.damage;
                    bullets.splice(i, 1);
                    if (e.hp <= 0) enemies.splice(ei, 1);
                }
            });
        }
        if (Math.abs(b.x - player.x) > 1200) bullets.splice(i, 1);
    }

    // 敵AI
    enemies.forEach(e => {
        let dx = player.x - e.x; let dy = player.y - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 300) { e.x += (dx/dist) * e.speed; e.y += (dy/dist) * e.speed; }
        if (time - e.lastFired > e.fireInterval) {
            shoot(e.x, e.y, player.x, player.y, true, e.type);
            e.lastFired = time;
        }
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.save();
    ctx.translate(-camera.x, -camera.y);
    ctx.clearRect(camera.x, camera.y, canvas.width, canvas.height);

    // 背景グリッド
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 2;
    for(let x=0; x<WORLD_WIDTH; x+=200) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,WORLD_HEIGHT); ctx.stroke(); }
    for(let y=0; y<WORLD_HEIGHT; y+=200) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(WORLD_WIDTH,y); ctx.stroke(); }

    // 本部エリア
    ctx.fillStyle = "rgba(255, 0, 0, 0.15)";
    ctx.fillRect(WORLD_WIDTH - 600, 0, 600, WORLD_HEIGHT);
    ctx.strokeStyle = "#f00";
    ctx.strokeRect(WORLD_WIDTH - 600, 0, 600, WORLD_HEIGHT);

    // プレイヤー
    ctx.shadowBlur = 20; ctx.shadowColor = "#0ff";
    ctx.fillStyle = "#0ff";
    ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // 敵
    enemies.forEach(e => {
        ctx.fillStyle = e.type === 'heavy' ? "#f0f" : "#f44";
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
        // HPゲージ
        ctx.fillStyle = "#333"; ctx.fillRect(e.x-25, e.y-40, 50, 6);
        ctx.fillStyle = e.type === 'heavy' ? "#f0f" : "#f00";
        ctx.fillRect(e.x-25, e.y-40, (e.hp/e.maxHp)*50, 6);
    });

    // 弾丸
    bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.shadowBlur = 5; ctx.shadowColor = b.color;
        ctx.fillRect(b.x-4, b.y-4, 8, 8);
    });

    ctx.restore();

    if (gameState === 'win') {
        ctx.fillStyle = "#0ff"; ctx.font = "bold 80px sans-serif";
        ctx.fillText("MISSION COMPLETE", canvas.width/2 - 400, canvas.height/2);
    }
    if (gameState === 'gameover') {
        ctx.fillStyle = "#f00"; ctx.font = "bold 80px sans-serif";
        ctx.fillText("SYSTEM FAILURE", canvas.width/2 - 350, canvas.height/2);
    }
}

requestAnimationFrame(update);
</script>
</body>
</html>
